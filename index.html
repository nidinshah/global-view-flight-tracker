/* ================================================================
   GEO HELPERS
   ================================================================ */

const DEG = Math.PI / 180;
const EARTH_KM = 6371;

function latLngToVec3(lat, lng, r) {
  const phi = (90 - lat) * DEG;
  const theta = (lng + 180) * DEG;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}

function vec3ToLatLng(v) {
  const lat = 90 - Math.acos(Math.max(-1, Math.min(1, v.y / v.length()))) / DEG;
  let lng = Math.atan2(v.z, -v.x) / DEG - 180;
  if (lng < -180) lng += 360;
  return { lat, lng };
}

// great-circle distance in km
function gcKm(a, b) {
  const φ1 = a.lat * DEG, φ2 = b.lat * DEG, dφ = (b.lat - a.lat) * DEG, dλ = (b.lng - a.lng) * DEG;
  const h = Math.sin(dφ / 2) ** 2 + Math.cos(φ1) * Math.cos(φ2) * Math.sin(dλ / 2) ** 2;
  return 2 * EARTH_KM * Math.asin(Math.min(1, Math.sqrt(h)));
}

// destination point along a bearing (angular distance δ in radians)
function destPoint(lat, lng, bearing, delta) {
  const φ1 = lat * DEG, λ1 = lng * DEG, θ = bearing * DEG;
  const φ2 = Math.asin(Math.sin(φ1) * Math.cos(delta) + Math.cos(φ1) * Math.sin(delta) * Math.cos(θ));
  const λ2 = λ1 + Math.atan2(Math.sin(θ) * Math.sin(delta) * Math.cos(φ1), Math.cos(delta) - Math.sin(φ1) * Math.sin(φ2));
  return { lat: φ2 / DEG, lng: ((λ2 / DEG + 540) % 360) - 180 };
}

function airlineName(callsign) {
  const m = (callsign || '').toUpperCase().match(/^([A-Z]{3})/);
  return (m && AIRLINE_NAMES[m[1]]) || null;
}

function searchCandidates(input) {
  const norm = (input || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
  if (!norm) return [];
  const out = [norm];
  // IATA flight number (2 alphanumeric + digits) → ICAO callsign, e.g. TR51 → TGW51
  const iata = norm.match(/^([A-Z0-9]{2})(\d{1,4})[A-Z]?$/);
  if (iata && AIRLINE_ICAO[iata[1]]) out.push(AIRLINE_ICAO[iata[1]] + iata[2]);
  // number-padding variants for every airline-like candidate — carriers
  // broadcast the same flight as "TGW51" and "TGW051" inconsistently, and the
  // callsign index only matches the exact broadcast string
  for (const c of [...out]) {
    const mm = c.match(/^([A-Z]{2,3})(\d{1,4})$/);
    if (!mm) continue;
    const prefix = mm[1], n = parseInt(mm[2], 10);
    out.push(prefix + n);                                    // no leading zeros
    if (n < 1000) out.push(prefix + String(n).padStart(3, '0'));   // 3-digit padded
  }
  return [...new Set(out)].slice(0, 6);
}

/* Passive per-source health: every fetchJson call records latency and
   consecutive failures for its host, powering the DATA status indicator. */
const SOURCE_HEALTH = {};
function recordHealth(url, ok, ms) {
  try {
    const h = new URL(url).hostname.replace(/^api\./, '').replace(/^www\./, '');
    const s = SOURCE_HEALTH[h] || (SOURCE_HEALTH[h] = { ok: true, fails: 0, ms: 0, ts: 0 });
    s.ts = Date.now();
    s.ms = s.ms ? s.ms * 0.6 + ms * 0.4 : ms;   // smoothed latency
    if (ok) { s.ok = true; s.fails = 0; }
    else { s.fails++; if (s.fails >= 2) s.ok = false; }
  } catch (e) { /* ignore malformed URLs */ }
}

async function fetchJson(url, opts, timeoutMs = 9000) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), timeoutMs);
  const t0 = performance.now();
  try {
    const res = await fetch(url, { ...opts, signal: ctrl.signal });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const j = await res.json();
    recordHealth(url, true, performance.now() - t0);
    return j;
  } catch (e) {
    recordHealth(url, false, performance.now() - t0);
    throw e;
  } finally { clearTimeout(t); }
}

// find the aircraft for a user-entered flight code.
// Sequential with early-exit: the exact form usually hits on the first try,
// and this avoids the parallel request burst that can trip the API rate limit
// (which would make a live flight look "not found").
async function findAircraft(input) {
  const cands = searchCandidates(input);
  for (const c of cands) {
    try {
      const j = await fetchJson('https://api.airplanes.live/v2/callsign/' + encodeURIComponent(c));
      const ac = (j.ac || []).filter(a => a.lat != null && a.lon != null);
      if (ac.length) return { ac: ac[0], callsign: c };
    } catch (e) { /* rate-limit or transient miss — try the next candidate */ }
  }
  return null;
}

// resolve departure/arrival airports for a callsign.
// Primary: adsbdb (route + airline in one call) · Fallback: hexdb
async function findRoute(callsign) {
  try {
    const j = await fetchJson('https://api.adsbdb.com/v0/callsign/' + encodeURIComponent(callsign));
    const fr = j && j.response && j.response.flightroute;
    if (fr && fr.origin && fr.destination && fr.origin.latitude != null) {
      const mk = (a) => ({
        icao: a.icao_code, iata: a.iata_code || a.icao_code, name: a.name || a.icao_code,
        region: a.municipality || '', country: a.country_iso_name || a.country_name || '',
        elevation: a.elevation, lat: a.latitude, lng: a.longitude,
      });
      return {
        dep: mk(fr.origin), arr: mk(fr.destination),
        airline: fr.airline ? { name: fr.airline.name, iata: fr.airline.iata, icao: fr.airline.icao, country: fr.airline.country, radio: fr.airline.callsign } : null,
        iataCode: fr.callsign_iata || null,
        source: 'adsbdb',
      };
    }
  } catch (e) { /* fall through to hexdb */ }
  try {
    const j = await fetchJson('https://hexdb.io/api/v1/route/icao/' + encodeURIComponent(callsign));
    const route = (j && j.route) || '';
    if (!route.includes('-')) return null;
    const parts = route.split('-').filter(Boolean);
    const depIcao = parts[0], arrIcao = parts[parts.length - 1];
    if (!depIcao || !arrIcao || depIcao === arrIcao) return null;
    const [dep, arr] = await Promise.all([
      fetchJson('https://hexdb.io/api/v1/airport/icao/' + depIcao),
      fetchJson('https://hexdb.io/api/v1/airport/icao/' + arrIcao),
    ]);
    const mk = (a) => (a && a.latitude != null) ? {
      icao: a.icao, iata: a.iata || a.icao, name: a.airport || a.icao,
      region: a.region_name || '', country: a.country_code || '',
      lat: a.latitude, lng: a.longitude,
    } : null;
    const d = mk(dep), r = mk(arr);
    return (d && r) ? { dep: d, arr: r, airline: null, source: 'hexdb' } : null;
  } catch (e) { return null; }
}

// all airborne aircraft within `radiusNm` of a point (API caps at 250 nm)
async function fetchTraffic(lat, lng, radiusNm = 250) {
  const j = await fetchJson(`https://api.airplanes.live/v2/point/${lat.toFixed(3)}/${lng.toFixed(3)}/${radiusNm}`);
  const now = Date.now();
  return (j.ac || [])
    .filter(a => a.lat != null && a.lon != null && a.alt_baro !== 'ground' && (a.flight || '').trim())
    .map(a => ({
      callsign: (a.flight || '').trim(),
      hex: a.hex,
      lat: a.lat, lng: a.lon,
      gs: typeof a.gs === 'number' ? a.gs : 0,
      track: typeof a.track === 'number' ? a.track : 0,
      alt: typeof a.alt_baro === 'number' ? a.alt_baro : 0,
      squawk: a.squawk || '',
      type: (a.t || '').trim(),
      category: a.category || '',
      rx: now - (a.seen_pos || 0) * 1000,
    }));
}

/* Country sweep: every transponder currently over a country, grouped by
   inferred phase. Keyless ADS-B has no schedules, so phases come from the
   live data itself: climb/descent rate splits departures from arrivals,
   ground returns are "standby". Large countries are sampled with up to four
   250 nm circles spread across the bounding box, merged by airframe hex. */
async function fetchCountryFlights(eng, info) {
  const [w, s, e, n] = info.bbox;
  const spanX = e - w, spanY = n - s;
  const pts = [{ lat: info.centroid.lat, lng: info.centroid.lng }];
  if (spanX > 9) pts.push(
    { lat: (s + n) / 2, lng: w + spanX * 0.22 },
    { lat: (s + n) / 2, lng: e - spanX * 0.22 }
  );
  if (spanY > 12) pts.push({ lat: n - spanY * 0.22, lng: (w + e) / 2 });
  const samples = pts.slice(0, 4);
  const seen = new Map();
  const now = Date.now();
  for (const p of samples) {
    try {
      const j = await fetchJson(`https://api.airplanes.live/v2/point/${p.lat.toFixed(2)}/${p.lng.toFixed(2)}/250`);
      for (const a of (j.ac || [])) {
        if (a.lat == null || a.lon == null || seen.has(a.hex)) continue;
        if (/^C/.test(a.category || '')) continue;   // airport ground vehicles
        const callsign = (a.flight || '').trim() || (a.r || '').trim();
        if (!callsign) continue;
        if (!eng.countryContains(info.rec, a.lat, a.lon)) continue;
        const ground = a.alt_baro === 'ground';
        const alt = ground ? 'ground' : (typeof a.alt_baro === 'number' ? a.alt_baro : 0);
        const altN = typeof alt === 'number' ? alt : 0;
        const vr = typeof a.baro_rate === 'number' ? a.baro_rate : 0;
        seen.set(a.hex, {
          hex: a.hex, callsign, lat: a.lat, lng: a.lon,
          gs: typeof a.gs === 'number' ? a.gs : 0,
          track: typeof a.track === 'number' ? a.track : 0,
          alt, vr, squawk: a.squawk || '', type: (a.t || '').trim(), category: a.category || '',
          rx: now - (a.seen_pos || 0) * 1000,
          phase: ground ? 'standby'
            : (vr > 500 && altN < 15000) ? 'departing'
            : (vr < -500 && altN < 15000) ? 'arriving'
            : 'transit',
        });
      }
    } catch (err) { /* one failed sample shouldn't kill the sweep */ }
    await new Promise(r => setTimeout(r, 350));   // stay well under the API rate limit
  }
  return { list: [...seen.values()], samples: samples.length };
}

function normalizeLive(a) {
  return {
    lat: a.lat, lng: a.lon,
    gs: typeof a.gs === 'number' ? a.gs : 0,             // knots
    track: typeof a.track === 'number' ? a.track : 0,     // degrees
    alt: a.alt_baro,                                      // feet | 'ground'
    baroRate: typeof a.baro_rate === 'number' ? a.baro_rate : 0,
    squawk: a.squawk || '—',
    hex: a.hex || '—',
    reg: (a.r || '').trim() || '—',
    type: (a.t || '').trim() || '—',
    seenPos: a.seen_pos || 0,
    rx: Date.now() - (a.seen_pos || 0) * 1000,
    raw: a,   // full readsb record — every tiny field for the details drawer
  };
}

/* ================================================================
   SHADERS
   ================================================================ */

const EARTH_VERT = `
  varying vec2 vUv;
  varying vec3 vWorldNormal;
  varying vec3 vViewNormal;
  varying vec3 vWorldPos;
  varying vec3 vTanEast;
  varying vec3 vTanNorth;
  void main() {
    vUv = uv;
    vWorldNormal = normalize(mat3(modelMatrix) * normal);
    vViewNormal  = normalize(normalMatrix * normal);
    // tangent basis for the equirect map: +u is east, +v is north.
    // built in object space (poles degenerate — fine, the map does too)
    vec3 eastObj  = normalize(cross(vec3(0.0, 1.0, 0.0), normal));
    vTanEast  = normalize(mat3(modelMatrix) * eastObj);
    vTanNorth = normalize(cross(vWorldNormal, vTanEast));
    vec4 wp = modelMatrix * vec4(position, 1.0);
    vWorldPos = wp.xyz;
    gl_Position = projectionMatrix * viewMatrix * wp;
  }
`;

const EARTH_FRAG = `
  uniform sampler2D dayMap;
  uniform sampler2D nightMap;
  uniform sampler2D topoMap;
  uniform sampler2D waterMap;
  uniform sampler2D normalMap;    // tangent-space, generated from the elevation map
  uniform sampler2D detailMap;    // tiled high-frequency detail normal for close zoom
  uniform float uHasDetail;
  uniform float uHasNormal;
  uniform float uDetailAmt;       // 0 far → 1 close-zoom
  uniform vec2 uTopoTexel;        // 1 / topo texture size (updated on 4K swap)
  uniform vec3 sunDir;
  varying vec2 vUv;
  varying vec3 vWorldNormal;
  varying vec3 vViewNormal;
  varying vec3 vWorldPos;
  varying vec3 vTanEast;
  varying vec3 vTanNorth;

  void main() {
    vec3 N = normalize(vWorldNormal);
    vec3 S = normalize(sunDir);
    vec3 T = normalize(vTanEast);
    vec3 B = normalize(vTanNorth);
    vec3 day   = texture2D(dayMap, vUv).rgb;
    vec3 night = texture2D(nightMap, vUv).rgb;

    float sunDot = dot(N, S);
    float dayFactor = smoothstep(-0.12, 0.35, sunDot);
    float twilight = smoothstep(-0.18, 0.0, sunDot) * (1.0 - smoothstep(0.0, 0.25, sunDot));

    // Slightly cool the daylight texture and lift it for presence on the dark UI
    day = pow(day, vec3(1.03)) * vec3(1.08, 1.10, 1.14);

    float water = uHasDetail > 0.5
      ? texture2D(waterMap, vUv).r
      : smoothstep(0.02, 0.15, day.b - day.r);
    float land = 1.0 - water;

    // ---- perturbed surface normal ----
    vec3 Np = N;
    if (uHasNormal > 0.5) {
      // proper tangent-space normal map (Sobel of the elevation map, cos-lat corrected)
      vec3 tn = texture2D(normalMap, vUv).xyz * 2.0 - 1.0;
      // tiled detail normal keeps terrain crisp when zoomed in tight;
      // a whisper of it on water animates the sun-glint like wave chop
      vec3 dn = texture2D(detailMap, vUv * vec2(24.0, 12.0)).xyz * 2.0 - 1.0;
      tn.xy += dn.xy * uDetailAmt * (0.22 + 0.55 * land);
      Np = normalize(T * tn.x + B * tn.y + N * max(tn.z, 0.2));
    } else if (uHasDetail > 0.5) {
      // fallback while the normal map is still being generated
      float h  = texture2D(topoMap, vUv).r;
      float hU = texture2D(topoMap, vUv + vec2(uTopoTexel.x, 0.0)).r;
      float hV = texture2D(topoMap, vUv + vec2(0.0, uTopoTexel.y)).r;
      Np = normalize(N - ((hU - h) * T + (hV - h) * B) * 18.0);
    }

    // terrain relief: difference between lit perturbed and smooth normal (safe contrast)
    float relief = dot(Np, S) - sunDot;
    day *= 1.0 + relief * land * 2.3;

    vec3 nightGlow = night * vec3(1.0, 0.82, 0.55) * 2.1;
    vec3 color = mix(nightGlow, day, dayFactor);

    color += vec3(0.9, 0.45, 0.15) * twilight * 0.16;

    // ---- ocean specular: tight sun-glint + broad sheen (Blinn-Phong) ----
    vec3 V = normalize(cameraPosition - vWorldPos);
    vec3 H = normalize(S + V);
    float NdH = max(dot(Np, H), 0.0);
    float fres = pow(1.0 - max(dot(N, V), 0.0), 3.0);
    float glint = pow(NdH, 200.0) * 1.35;
    float sheen = pow(NdH, 26.0) * 0.22;
    vec3 glintCol = mix(vec3(1.0, 0.97, 0.90), vec3(1.0, 0.62, 0.32), min(twilight * 2.2, 1.0));
    color += glintCol * (glint + sheen) * water * dayFactor * (0.5 + 0.5 * fres);

    float rim = pow(1.0 - abs(normalize(vViewNormal).z), 2.4);
    color += vec3(0.30, 0.52, 1.0) * rim * (0.22 + 0.5 * dayFactor);

    gl_FragColor = vec4(color, 1.0);
  }
`;

const ATMO_VERT = `
  varying vec3 vNormal;
  varying vec3 vWorldNormal;
  void main() {
    vNormal = normalize(normalMatrix * normal);
    vWorldNormal = normalize(mat3(modelMatrix) * normal);
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;
/* Rayleigh-flavoured glow: blue on the day limb, thinning toward a warm
   sunset band at the terminator, faint on the night side. */
const ATMO_FRAG = `
  uniform vec3 sunDir;
  varying vec3 vNormal;
  varying vec3 vWorldNormal;
  void main() {
    float intensity = pow(0.62 - dot(normalize(vNormal), vec3(0.0, 0.0, 1.0)), 4.0);
    float sunDot = dot(normalize(vWorldNormal), normalize(sunDir));
    float dayF = smoothstep(-0.45, 0.15, sunDot);
    float warm = smoothstep(-0.30, 0.02, sunDot) * (1.0 - smoothstep(0.02, 0.40, sunDot));
    vec3 blue   = vec3(0.28, 0.55, 1.0);
    vec3 sunset = vec3(1.0, 0.40, 0.15);
    vec3 col = mix(blue, sunset, warm * 0.75);
    gl_FragColor = vec4(col, 1.0) * intensity * (0.30 + 0.70 * dayF);
  }
`;

/* Clouds lit by the same sun as the terrain: bright by day, dim blue by
   night (they occlude city lights), warm-edged at the terminator. */
const CLOUD_VERT = `
  varying vec2 vUv;
  varying vec3 vWorldNormal;
  void main() {
    vUv = uv;
    vWorldNormal = normalize(mat3(modelMatrix) * normal);
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;
const CLOUD_FRAG = `
  uniform sampler2D map;
  uniform vec3 sunDir;
  uniform float uOpacity;
  varying vec2 vUv;
  varying vec3 vWorldNormal;
  void main() {
    vec4 c = texture2D(map, vUv);
    if (c.a < 0.01) discard;
    float sunDot = dot(normalize(vWorldNormal), normalize(sunDir));
    float dayF = smoothstep(-0.12, 0.35, sunDot);
    float twilight = smoothstep(-0.18, 0.0, sunDot) * (1.0 - smoothstep(0.0, 0.25, sunDot));
    vec3 lit = mix(vec3(0.045, 0.065, 0.115), vec3(1.04, 1.02, 0.99), dayF);
    lit += vec3(1.0, 0.45, 0.20) * twilight * 0.38;
    gl_FragColor = vec4(c.rgb * lit, c.a * uOpacity);
  }
`;

const ARC_VERT = `
  varying vec2 vUv;
  void main() {
    vUv = uv;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;
const ARC_FRAG = `
  uniform float uTime;
  uniform vec3 uColorA;
  uniform vec3 uColorB;
  uniform float uSpeed;
  uniform float uBase;
  uniform float uPhase;
  varying vec2 vUv;
  void main() {
    float u = vUv.x;
    vec3 col = mix(uColorA, uColorB, smoothstep(0.1, 0.75, u));
    float p = fract(u - uTime * uSpeed + uPhase);
    float comet = pow(smoothstep(0.35, 1.0, p), 3.0);
    vec3 outCol = col * (uBase + comet * 1.3);
    gl_FragColor = vec4(outCol, 1.0);
  }
`;

function makeGlowTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 128;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
  g.addColorStop(0, 'rgba(120, 205, 255, 0.85)');
  g.addColorStop(0.35, 'rgba(80, 160, 255, 0.32)');
  g.addColorStop(1, 'rgba(60, 130, 255, 0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 128, 128);
  return new THREE.CanvasTexture(c);
}

function makeFallbackDayTexture() {
  const c = document.createElement('canvas');
  c.width = 1024; c.height = 512;
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0, 0, 0, 512);
  g.addColorStop(0, '#0d2246'); g.addColorStop(0.5, '#123157'); g.addColorStop(1, '#0b1d3a');
  ctx.fillStyle = g; ctx.fillRect(0, 0, 1024, 512);
  ctx.strokeStyle = 'rgba(140,180,255,0.14)'; ctx.lineWidth = 1;
  for (let i = 0; i <= 12; i++) { ctx.beginPath(); ctx.moveTo(i * 1024 / 12, 0); ctx.lineTo(i * 1024 / 12, 512); ctx.stroke(); }
  for (let i = 0; i <= 6; i++) { ctx.beginPath(); ctx.moveTo(0, i * 512 / 6); ctx.lineTo(1024, i * 512 / 6); ctx.stroke(); }
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

/* Build a proper tangent-space normal map from the elevation texture.
   Central-difference slopes, corrected for the equirect cos(lat) squeeze so
   east–west relief doesn't flatten near the poles. Runs in row chunks off
   the frame loop, so even the 4096×2048 pass never causes a visible hitch.
   Stays in linear colour space — it's data, not colour. */
function buildNormalMapFromHeight(img, strength, onDone) {
  const w = img.width, h = img.height;
  if (!w || !h) { onDone(null); return () => {}; }
  const src = document.createElement('canvas');
  src.width = w; src.height = h;
  const sctx = src.getContext('2d', { willReadFrequently: true });
  sctx.drawImage(img, 0, 0);
  let data;
  try { data = sctx.getImageData(0, 0, w, h).data; }
  catch (e) { onDone(null); return () => {}; }   // canvas tainted (shouldn't happen — crossOrigin set)

  const out = document.createElement('canvas');
  out.width = w; out.height = h;
  const oimg = out.getContext('2d').createImageData(w, h);
  const od = oimg.data;
  const R = (x, y) => data[((y < 0 ? 0 : y >= h ? h - 1 : y) * w + ((x % w) + w) % w) * 4];

  let y = 0, cancelled = false;
  const ROWS = 96;
  const chunk = () => {
    if (cancelled) return;
    const yEnd = Math.min(y + ROWS, h);
    for (; y < yEnd; y++) {
      const lat = (0.5 - (y + 0.5) / h) * Math.PI;
      const invCos = 1 / Math.max(Math.cos(lat), 0.25);
      for (let x = 0; x < w; x++) {
        const sE = (R(x + 1, y) - R(x - 1, y)) / 510 * invCos;   // east slope
        const sN = (R(x, y - 1) - R(x, y + 1)) / 510;             // north slope
        let nx = -sE * strength, ny = -sN * strength, nz = 1;
        const il = 1 / Math.sqrt(nx * nx + ny * ny + 1);
        nx *= il; ny *= il; nz *= il;
        const o = (y * w + x) * 4;
        od[o] = (nx * 0.5 + 0.5) * 255;
        od[o + 1] = (ny * 0.5 + 0.5) * 255;
        od[o + 2] = (nz * 0.5 + 0.5) * 255;
        od[o + 3] = 255;
      }
    }
    if (y < h) { setTimeout(chunk, 0); return; }
    out.getContext('2d').putImageData(oimg, 0, 0);
    const tex = new THREE.CanvasTexture(out);
    tex.wrapS = THREE.RepeatWrapping;
    onDone(tex);
  };
  setTimeout(chunk, 0);
  return () => { cancelled = true; };
}

/* Small tileable fractal-noise normal map, blended in at close zoom so
   terrain keeps micro-texture past the base map's resolution. */
function makeDetailNormalTexture(size = 256) {
  const height = new Float32Array(size * size);
  let amp = 1, cells = 8;
  for (let oct = 0; oct < 4; oct++, amp *= 0.5, cells *= 2) {
    const g = new Float32Array(cells * cells);
    for (let i = 0; i < g.length; i++) g[i] = Math.random();
    const step = size / cells;
    for (let y = 0; y < size; y++) {
      const gy = y / step, y0 = Math.floor(gy) % cells, y1 = (y0 + 1) % cells;
      const fy = gy - Math.floor(gy), sy = fy * fy * (3 - 2 * fy);
      for (let x = 0; x < size; x++) {
        const gx = x / step, x0 = Math.floor(gx) % cells, x1 = (x0 + 1) % cells;
        const fx = gx - Math.floor(gx), sx = fx * fx * (3 - 2 * fx);
        const a = g[y0 * cells + x0], b = g[y0 * cells + x1];
        const c2 = g[y1 * cells + x0], d = g[y1 * cells + x1];
        height[y * size + x] += amp * ((a + (b - a) * sx) + ((c2 + (d - c2) * sx) - (a + (b - a) * sx)) * sy);
      }
    }
  }
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const oimg2 = c.getContext('2d').createImageData(size, size);
  const od = oimg2.data;
  const K = 3.2;
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const xm = (x - 1 + size) % size, xp = (x + 1) % size;
      const ym = (y - 1 + size) % size, yp = (y + 1) % size;
      let nx = -(height[y * size + xp] - height[y * size + xm]) * K;
      let ny = -(height[ym * size + x] - height[yp * size + x]) * K;
      const il = 1 / Math.sqrt(nx * nx + ny * ny + 1);
      nx *= il; ny *= il;
      const o = (y * size + x) * 4;
      od[o] = (nx * 0.5 + 0.5) * 255;
      od[o + 1] = (ny * 0.5 + 0.5) * 255;
      od[o + 2] = ((1 * il) * 0.5 + 0.5) * 255;
      od[o + 3] = 255;
    }
  }
  c.getContext('2d').putImageData(oimg2, 0, 0);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

/* ================================================================
   GLOBE ENGINE
   ================================================================ */

class GlobeEngine {
  constructor(host, opts) {
    this.host = host;
    this.opts = opts;
    this.mode = '3d';
    this.isNight = false;
    this.disposed = false;

    this.dragging = false;
    this.rot = { x: 0.16, y: 0.05 };
    this.rotTarget = { x: 0.16, y: 0.05 };
    this.vel = { x: 0, y: 0 };
    this.pan = { x: 0, y: 0 };
    this.panTarget = { x: 0, y: 0 };
    this.DIST0 = 3.05;
    this.MIN_DIST = 1.35;
    this.dist = 3.6;
    this.distTarget = this.DIST0;
    this.idleTime = 0;
    this.nightMix = 0;

    // flight tracking state
    this.flightState = null;      // {lat,lng,gs,track,alt,rx}
    this.planeVec = null;         // unit vector, smoothed display position
    this.planeLat = 0; this.planeLng = 0;
    this.planeR = 1.01;
    this.follow = false;

    // area traffic layer
    this.traffic = [];            // [{callsign,lat,lng,gs,track,alt,rx}]
    this.trafficOn = false;
    this.trafficHover = -1;

    const t0 = opts.initialTarget;
    this.home = t0 || null;
    if (t0) {
      this.rot.x = this.rotTarget.x = Math.max(-1.2, Math.min(1.2, t0.lat * DEG));
      this.rot.y = this.rotTarget.y = -(t0.lng + 90) * DEG;
      this.distTarget = t0.dist || 2.2;
      this.dist = this.distTarget + 0.8;
    }

    this.markers = [];
    this.countryLabels = [];
    this.countryCentroids = [];
    this._v = new THREE.Vector3();
  }

  async init() {
    const w = this.host.clientWidth, h = this.host.clientHeight;
    const onProgress = this.opts.onProgress || (() => {});

    onProgress(8, 'Initializing renderer');
    try {
      this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: 'high-performance' });
    } catch (e) {
      this.opts.onError && this.opts.onError('WebGL is not available in this browser.');
      return;
    }
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 3));
    this.renderer.setSize(w, h);
    this.renderer.setClearColor(0x000000, 0);
    this.host.appendChild(this.renderer.domElement);

    this.scene = new THREE.Scene();
    this.camera = new THREE.PerspectiveCamera(42, w / h, 0.1, 200);
    this.camera.position.set(0, 0, this.dist);

    this.sunCur = new THREE.Vector3(0.55, 0.32, 0.85).normalize();
    this.sunTarget = this.sunCur.clone();
    this.sunLight = new THREE.DirectionalLight(0xfff2dd, 2.4);
    this.sunLight.position.copy(this.sunCur).multiplyScalar(5);
    this.scene.add(this.sunLight);
    this.scene.add(new THREE.AmbientLight(0x223355, 0.55));

    // stars
    const starGeo = new THREE.BufferGeometry();
    const starCount = 1400;
    const pos = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      const v = new THREE.Vector3().randomDirection().multiplyScalar(40 + Math.random() * 40);
      pos.set([v.x, v.y, v.z], i * 3);
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    this.stars = new THREE.Points(starGeo, new THREE.PointsMaterial({
      color: 0x9db8ff, size: 1.5, sizeAttenuation: false, transparent: true, opacity: 0.42,
    }));
    this.scene.add(this.stars);

    // textures — the fast 2K tier paints in seconds; the true-4K set streams
    // in behind it (per-texture swap) and clouds never block the first frame
    const loader = new THREE.TextureLoader();
    loader.setCrossOrigin('anonymous');
    this._loadTex = (url) => new Promise((res, rej) => loader.load(url, res, undefined, rej));

    onProgress(18, 'Loading satellite imagery');
    const F = TEXTURES.fast;
    const [dayR, nightR, topoR, waterR] = await Promise.allSettled([
      this._loadTex(F.day), this._loadTex(F.night), this._loadTex(F.topo), this._loadTex(F.water),
    ]);
    if (this.disposed) return;
    onProgress(58, 'Compositing atmosphere');

    let dayTex, nightTex;
    if (dayR.status === 'fulfilled') { dayTex = dayR.value; dayTex.colorSpace = THREE.SRGBColorSpace; }
    else dayTex = makeFallbackDayTexture();
    if (nightR.status === 'fulfilled') { nightTex = nightR.value; nightTex.colorSpace = THREE.SRGBColorSpace; }
    else { nightTex = makeFallbackDayTexture(); }
    // elevation & water are data textures — they stay in linear colour space
    // (no sRGB decode) or the terrain-relief lighting math breaks
    const topoTex  = topoR.status  === 'fulfilled' ? topoR.value  : null;
    const waterTex = waterR.status === 'fulfilled' ? waterR.value : null;
    this._topoOK = !!topoTex;
    this._waterOK = !!waterTex;
    const hasDetail = !!(topoTex && waterTex);

    const maxAniso = this._maxAniso = this.renderer.capabilities.getMaxAnisotropy();
    [dayTex, nightTex, topoTex, waterTex].forEach(t => { if (t) t.anisotropy = maxAniso; });

    // XYZ order: rotation.x is exactly the front latitude, rotation.y maps
    // linearly to the front longitude — drag spins the globe about its pole.
    this.earthGroup = new THREE.Group();
    this.earthGroup.rotation.order = 'XYZ';
    this.scene.add(this.earthGroup);

    this.detailTex = makeDetailNormalTexture(256);
    this.earthMat = new THREE.ShaderMaterial({
      uniforms: {
        dayMap: { value: dayTex },
        nightMap: { value: nightTex },
        topoMap: { value: topoTex || dayTex },
        waterMap: { value: waterTex || dayTex },
        normalMap: { value: this.detailTex },   // placeholder until the real one is generated
        detailMap: { value: this.detailTex },
        uHasDetail: { value: hasDetail ? 1 : 0 },
        uHasNormal: { value: 0 },
        uDetailAmt: { value: 0 },
        uTopoTexel: { value: topoTex && topoTex.image
          ? new THREE.Vector2(1 / topoTex.image.width, 1 / topoTex.image.height)
          : new THREE.Vector2(1 / 2048, 1 / 1024) },
        sunDir: { value: this.sunCur.clone() },
      },
      vertexShader: EARTH_VERT,
      fragmentShader: EARTH_FRAG,
    });
    this.earth = new THREE.Mesh(new THREE.SphereGeometry(1, 128, 128), this.earthMat);
    this.earthGroup.add(this.earth);

    this.atmoMat = new THREE.ShaderMaterial({
      uniforms: { sunDir: { value: this.sunCur.clone() } },
      vertexShader: ATMO_VERT, fragmentShader: ATMO_FRAG,
      blending: THREE.AdditiveBlending, side: THREE.BackSide, transparent: true, depthWrite: false,
    });
    const atmo = new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), this.atmoMat);
    atmo.scale.setScalar(1.16);
    this.scene.add(atmo);

    const ringPts = new THREE.EllipseCurve(0, 0, 1.21, 1.21).getPoints(160);
    this.ring = new THREE.LineLoop(
      new THREE.BufferGeometry().setFromPoints(ringPts),
      new THREE.LineBasicMaterial({ color: 0x6d8fd4, transparent: true, opacity: 0.28 })
    );
    this.scene.add(this.ring);

    onProgress(72, 'Preparing flight layers');
    this.arcMats = [];
    this._buildAmbientArcs();
    this._buildMap2D(dayTex, nightTex);
    this._buildWeatherLayer();
    this._buildFlightLayers();
    this._collectMarkers();
    this._bindEvents();

    onProgress(84, 'Tracing country borders');
    try { await this._buildBorders(); } catch (e) { /* offline: globe still works without borders */ }

    onProgress(92, 'Calibrating orbit');
    this.clock = new THREE.Clock();
    this._loop = this._loop.bind(this);
    this.renderer.setAnimationLoop(this._loop);
    // headless/hidden tabs never fire rAF — a slow ticker keeps state alive there
    this._ticker = setInterval(() => {
      if ((performance.now() - (this._lastLoopAt || 0)) > 45) this._loop();
    }, 33);

    setTimeout(() => { if (!this.disposed) { onProgress(100, 'Ready'); this.opts.onReady && this.opts.onReady(); } }, 450);

    // stream in the heavy layers once the first frame is on screen
    setTimeout(() => { if (!this.disposed) this._loadClouds(); }, 700);
    setTimeout(() => {
      if (!this.disposed && this._topoOK) this._regenNormalMap(this.earthMat.uniforms.topoMap.value);
    }, 1400);
    if ((this.opts.textureTier || 'full') === 'full') {
      setTimeout(() => { if (!this.disposed) this.upgradeTextures(); }, 1900);
    }
  }

  /* ---------- progressive texture pipeline ---------- */

  _loadClouds() {
    this._loadTex(TEXTURES.clouds)
      .catch(() => this._loadTex(TEXTURES.cloudsFallback))
      .then(tex => {
        if (this.disposed || !tex) return;
        tex.anisotropy = this._maxAniso;
        tex.colorSpace = THREE.SRGBColorSpace;
        this.cloudMat = new THREE.ShaderMaterial({
          uniforms: { map: { value: tex }, sunDir: { value: this.sunCur.clone() }, uOpacity: { value: 0 } },
          vertexShader: CLOUD_VERT, fragmentShader: CLOUD_FRAG,
          transparent: true, depthWrite: false,
        });
        this.clouds = new THREE.Mesh(new THREE.SphereGeometry(1.012, 96, 96), this.cloudMat);
        this.clouds.renderOrder = 1;
        this.clouds.visible = (this.cloudsOn !== false) && this.mode === '3d';
        this.earthGroup.add(this.clouds);
        this._cloudOpacityTarget = 0.62;   // fades in via the frame loop
      })
      .catch(() => { /* offline: globe simply has no cloud layer */ });
  }

  // background upgrade to the true-4K tier (Settings quality ≠ balanced)
  upgradeTextures() {
    if (this._upgradeStarted || this.disposed) return;
    this._upgradeStarted = true;
    const U = TEXTURES.full;
    const swap = (key, slot, srgb) => this._loadTex(U[key]).then(tex => {
      if (this.disposed) return;
      tex.anisotropy = this._maxAniso;
      if (srgb) tex.colorSpace = THREE.SRGBColorSpace;
      const uni = this.earthMat.uniforms;
      const old = uni[slot].value;
      uni[slot].value = tex;
      if (key === 'topo') {
        this._topoOK = true;
        uni.uTopoTexel.value.set(1 / tex.image.width, 1 / tex.image.height);
        this._regenNormalMap(tex);
      }
      if (key === 'water') this._waterOK = true;
      uni.uHasDetail.value = (this._topoOK && this._waterOK) ? 1 : 0;
      if (key === 'day' && this.mapDayMat) { this.mapDayMat.map = tex; this.mapDayMat.needsUpdate = true; }
      if (key === 'night' && this.mapNightMat) { this.mapNightMat.map = tex; this.mapNightMat.needsUpdate = true; }
      if (old && old !== tex && old !== this.detailTex) old.dispose();
    }).catch(() => { /* keep the fast-tier texture */ });
    // staggered so four 4K decodes don't land in the same frames
    swap('day', 'dayMap', true);
    setTimeout(() => { if (!this.disposed) swap('night', 'nightMap', true); }, 500);
    setTimeout(() => { if (!this.disposed) swap('topo', 'topoMap', false); }, 1000);
    setTimeout(() => { if (!this.disposed) swap('water', 'waterMap', false); }, 1500);
  }

  _regenNormalMap(topoTex) {
    if (!topoTex || !topoTex.image || !topoTex.image.width) return;
    if (this._nmCancel) this._nmCancel();
    const gen = this._nmGen = (this._nmGen || 0) + 1;
    this._nmCancel = buildNormalMapFromHeight(topoTex.image, 5.0, (tex) => {
      if (!tex) return;
      if (this.disposed || gen !== this._nmGen) { tex.dispose(); return; }
      tex.anisotropy = this._maxAniso;
      const uni = this.earthMat.uniforms;
      const old = uni.normalMap.value;
      uni.normalMap.value = tex;
      uni.uHasNormal.value = 1;
      if (old && old !== this.detailTex) old.dispose();
    });
  }

  /* ---------- static scene pieces ---------- */

  _arcCurve(a, b, liftScale = 1) {
    const p0 = latLngToVec3(a.lat, a.lng, 1.002);
    const p3 = latLngToVec3(b.lat, b.lng, 1.002);
    const angle = p0.angleTo(p3);
    const lift = (0.16 + angle * 0.22) * liftScale;
    const p1 = p0.clone().lerp(p3, 0.28).normalize().multiplyScalar(1 + lift);
    const p2 = p0.clone().lerp(p3, 0.72).normalize().multiplyScalar(1 + lift);
    return new THREE.CubicBezierCurve3(p0, p1, p2, p3);
  }

  _arcMesh(curve, { colorA, colorB, radius, speed, base, phase }) {
    const geo = new THREE.TubeGeometry(curve, 72, radius, 8, false);
    const mat = new THREE.ShaderMaterial({
      uniforms: {
        uTime: { value: 0 },
        uColorA: { value: new THREE.Color(colorA) },
        uColorB: { value: new THREE.Color(colorB) },
        uSpeed: { value: speed },
        uBase: { value: base },
        uPhase: { value: phase },
      },
      vertexShader: ARC_VERT, fragmentShader: ARC_FRAG,
      blending: THREE.AdditiveBlending, transparent: true, depthWrite: false,
    });
    return new THREE.Mesh(geo, mat);
  }

  _buildAmbientArcs() {
    // faint decorative corridors (no dateline crossing, so they render in 2D too)
    const pairs = [
      [{ lat: 51.92, lng: 4.48 }, { lat: 40.71, lng: -74.00 }],
      [{ lat: -23.96, lng: -46.33 }, { lat: 38.72, lng: -9.14 }],
    ];
    pairs.forEach((p, i) => {
      const m = this._arcMesh(this._arcCurve(p[0], p[1], 1.15), {
        colorA: '#9fb4dd', colorB: '#c9d9ff', radius: 0.0024, speed: 0.05, base: 0.11, phase: i * 0.4,
      });
      this.earthGroup.add(m);
      this.arcMats.push(m.material);
    });
  }

  _buildMap2D(dayTex, nightTex) {
    this.mapGroup = new THREE.Group();
    this.mapGroup.visible = false;
    this.scene.add(this.mapGroup);

    this.mapDayMat = new THREE.MeshBasicMaterial({ map: dayTex });
    const dayPlane = new THREE.Mesh(new THREE.PlaneGeometry(4, 2), this.mapDayMat);
    this.mapNightMat = new THREE.MeshBasicMaterial({ map: nightTex, transparent: true, opacity: 0 });
    this.nightPlane = new THREE.Mesh(new THREE.PlaneGeometry(4, 2), this.mapNightMat);
    this.nightPlane.position.z = 0.001;
    this.mapGroup.add(dayPlane, this.nightPlane);
  }

  /* ---------- live weather radar (RainViewer, keyless) ---------- */

  _buildWeatherLayer() {
    this.weatherMat = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0.85, depthWrite: false });
    this.weatherSphere = new THREE.Mesh(new THREE.SphereGeometry(1.0135, 96, 96), this.weatherMat);
    this.weatherSphere.renderOrder = 2;   // radar reads above the cloud layer
    this.weatherSphere.visible = false;
    this.earthGroup.add(this.weatherSphere);
    this.weatherPlane = new THREE.Mesh(new THREE.PlaneGeometry(4, 2), this.weatherMat);
    this.weatherPlane.position.z = 0.002;
    this.weatherPlane.visible = false;
    this.mapGroup.add(this.weatherPlane);
  }

  setWeather(on) {
    this.weatherOn = !!on;
    if (this.weatherOn && !this._wxTimer) {
      this._wxRefresh();
      this._wxTimer = setInterval(() => this._wxRefresh(), WEATHER_REFRESH_MS);
    } else if (!this.weatherOn && this._wxTimer) {
      clearInterval(this._wxTimer);
      this._wxTimer = null;
    }
    this._updateWeatherVis();
  }

  async _wxRefresh() {
    if (this._wxLoading || this.disposed) return;
    this._wxLoading = true;
    try {
      const j = await fetchJson(RAINVIEWER_API, undefined, 12000);
      const past = (j.radar && j.radar.past) || [];
      const host = j.host || 'https://tilecache.rainviewer.com';
      const frames = past.slice(-WEATHER_FRAMES);
      const next = [];
      for (const f of frames) {
        if (!this.weatherOn || this.disposed) break;
        const tex = await this._wxBuildFrame(host, f.path);
        if (tex) next.push({ time: f.time, tex });
      }
      if (next.length && !this.disposed) {
        (this.wxFrames || []).forEach(fr => fr.tex.dispose());
        this.wxFrames = next;
        this._wxIdx = next.length - 1;
        this._wxClock = 0;
        this.weatherMat.map = next[next.length - 1].tex;
        this.weatherMat.needsUpdate = true;
        this._updateWeatherVis();
      } else {
        next.forEach(fr => fr.tex.dispose());
      }
    } catch (e) { /* offline / API hiccup — retry on the next cycle */ }
    this._wxLoading = false;
  }

  // one radar frame: 16 web-mercator tiles (z=2) composed onto a canvas,
  // then reprojected row-by-row into the globe's equirectangular mapping
  _wxBuildFrame(host, path) {
    const Z = 2, TN = 1 << Z, TS = 256;
    const loadImg = (url) => new Promise((res) => {
      const im = new Image();
      im.crossOrigin = 'anonymous';
      im.onload = () => res(im);
      im.onerror = () => res(null);
      im.src = url;
    });
    const jobs = [];
    for (let ty = 0; ty < TN; ty++)
      for (let tx = 0; tx < TN; tx++)
        jobs.push(loadImg(`${host}${path}/${TS}/${Z}/${tx}/${ty}/2/1_1.png`).then(im => ({ im, tx, ty })));
    return Promise.all(jobs).then(tiles => {
      if (this.disposed || tiles.every(t => !t.im)) return null;
      const W = TS * TN;
      const merc = document.createElement('canvas');
      merc.width = merc.height = W;
      const mctx = merc.getContext('2d');
      for (const t of tiles) if (t.im) mctx.drawImage(t.im, t.tx * TS, t.ty * TS);
      const eq = document.createElement('canvas');
      eq.width = W * 2; eq.height = W;
      const ectx = eq.getContext('2d');
      for (let yo = 0; yo < eq.height; yo++) {
        const lat = (0.5 - (yo + 0.5) / eq.height) * 180;
        if (Math.abs(lat) > 85) continue;   // outside mercator coverage — leave transparent
        const my = (1 - Math.log(Math.tan(Math.PI / 4 + lat * DEG / 2)) / Math.PI) / 2 * W;
        ectx.drawImage(merc, 0, Math.min(W - 1, Math.max(0, my - 0.5)), W, 1, 0, yo, eq.width, 1);
      }
      const tex = new THREE.CanvasTexture(eq);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = this._maxAniso || 1;
      return tex;
    });
  }

  _updateWeatherVis() {
    const has = !!(this.weatherOn && this.wxFrames && this.wxFrames.length);
    if (this.weatherSphere) this.weatherSphere.visible = has && this.mode === '3d';
    if (this.weatherPlane) this.weatherPlane.visible = has && this.mode === '2d';
  }

  _map2dArcCurve(a, b) {
    const p0 = new THREE.Vector3(a.lng / 90, a.lat / 90, 0);
    const p3 = new THREE.Vector3(b.lng / 90, b.lat / 90, 0);
    const lift = p0.distanceTo(p3) * 0.28 + 0.05;
    const p1 = p0.clone().lerp(p3, 0.3); p1.z = lift;
    const p2 = p0.clone().lerp(p3, 0.7); p2.z = lift;
    return new THREE.CubicBezierCurve3(p0, p1, p2, p3);
  }

  _buildFlightLayers() {
    // trail of actual flown positions (3D)
    const MAX = 600;
    this._trailMax = MAX;
    this._trailCount = 0;
    this._trailGeo = new THREE.BufferGeometry();
    this._trailPos = new Float32Array(MAX * 3);
    this._trailGeo.setAttribute('position', new THREE.BufferAttribute(this._trailPos, 3));
    this._trailGeo.setDrawRange(0, 0);
    this.trail = new THREE.Line(this._trailGeo, new THREE.LineBasicMaterial({
      color: 0xffc24b, transparent: true, opacity: 0.85, depthWrite: false,
    }));
    this.earthGroup.add(this.trail);

    // dotted great-circle prediction: current position → destination airport
    this.predLine = new THREE.Line(
      new THREE.BufferGeometry(),
      new THREE.LineDashedMaterial({
        color: 0xffe9b8, transparent: true, opacity: 0.5,
        dashSize: 0.016, gapSize: 0.014, depthWrite: false,
      })
    );
    this.predLine.visible = false;
    this.earthGroup.add(this.predLine);
    this._predDest = null;

    // departure / arrival glows
    const glowTex = makeGlowTexture();
    this.depGlow = new THREE.Sprite(new THREE.SpriteMaterial({
      map: glowTex, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending, depthWrite: false,
    }));
    this.arrGlow = this.depGlow.clone();
    this.depGlow.scale.setScalar(0.22); this.arrGlow.scale.setScalar(0.22);
    this.depGlow.visible = this.arrGlow.visible = false;
    this.earthGroup.add(this.depGlow, this.arrGlow);

    // area traffic: instanced airplane silhouettes, one per live aircraft
    const MAX_TRAFFIC = 400;
    this._trafficMax = MAX_TRAFFIC;
    // top-down airliner outline (nose points +Y); right half, mirrored to close
    const K = 0.021;
    const half = [
      [0.000,  0.52],   // nose tip
      [0.052,  0.40],   // cockpit shoulder
      [0.058,  0.15],   // wing root, leading edge
      [0.470, -0.06],   // wingtip, leading edge
      [0.470, -0.14],   // wingtip, trailing edge
      [0.062, -0.06],   // wing root, trailing edge
      [0.050, -0.32],   // rear fuselage
      [0.180, -0.43],   // tailplane tip, leading edge
      [0.180, -0.50],   // tailplane tip, trailing edge
      [0.036, -0.45],   // tail root
      [0.036, -0.53],   // tail end
    ];
    const planeShape = new THREE.Shape();
    planeShape.moveTo(half[0][0] * K, half[0][1] * K);
    for (let i = 1; i < half.length; i++) planeShape.lineTo(half[i][0] * K, half[i][1] * K);
    for (let i = half.length - 1; i >= 1; i--) planeShape.lineTo(-half[i][0] * K, half[i][1] * K);
    planeShape.closePath();
    const dart = new THREE.ShapeGeometry(planeShape);
    this.trafficMesh = new THREE.InstancedMesh(dart, new THREE.MeshBasicMaterial({
      color: 0x9adcff, transparent: true, opacity: 0.92, side: THREE.DoubleSide, depthWrite: false,
    }), MAX_TRAFFIC);
    this.trafficMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    this.trafficMesh.count = 0;
    this.trafficMesh.visible = false;
    this.earthGroup.add(this.trafficMesh);   // rotates with the globe
    this.raycaster = new THREE.Raycaster();
  }

  setTraffic(list) {
    this.traffic = (list || []).slice(0, this._trafficMax);
    this.trafficHover = -1;
  }

  setTrafficEnabled(b) {
    this.trafficOn = b;
    if (!b) {
      this.traffic = [];
      this.trafficHover = -1;
      if (this.trafficMesh) this.trafficMesh.count = 0;
      const tip = document.getElementById('traffic-tip');
      if (tip) tip.style.opacity = '0';
    }
  }

  _updateTraffic() {
    const show = this.trafficOn && this.mode === '3d' && this.traffic.length > 0;
    this.trafficMesh.visible = show;
    if (!show) { this.trafficMesh.count = 0; return; }

    const now = Date.now();
    const m = this._tm || (this._tm = new THREE.Matrix4());
    const P = this._tp || (this._tp = new THREE.Vector3());
    const north = this._tn || (this._tn = new THREE.Vector3());
    const east = this._te || (this._te = new THREE.Vector3());
    const dir = this._td || (this._td = new THREE.Vector3());
    const X = this._tx || (this._tx = new THREE.Vector3());

    const n = Math.min(this.traffic.length, this._trafficMax);
    for (let i = 0; i < n; i++) {
      const t = this.traffic[i];
      const age = Math.min(Math.max((now - t.rx) / 1000, 0), 600);
      const delta = ((t.gs || 0) * 0.514444 * age) / 6371000;
      const p = delta > 0 ? destPoint(t.lat, t.lng, t.track || 0, delta) : t;
      const r = 1.008 + Math.min(Math.max(t.alt || 0, 0), 45000) / 45000 * 0.02;
      P.copy(latLngToVec3(p.lat, p.lng, 1)).normalize();
      // tangent basis: forward = heading, up = surface normal
      north.set(0, 1, 0).addScaledVector(P, -P.y).normalize();
      east.crossVectors(north, P).normalize();
      const th = (t.track || 0) * DEG;
      dir.copy(north).multiplyScalar(Math.cos(th)).addScaledVector(east, Math.sin(th)).normalize();
      X.crossVectors(dir, P).normalize();
      m.makeBasis(X, dir, P);
      // zoom-compensated: icons keep a near-constant screen size at any distance
      const zs = Math.max(0.32, Math.min(2.2, (this.dist - 1.0) * 0.62));
      const s = (this.trafficHover === i ? 1.6 : 1) * zs;
      m.elements[0] *= s; m.elements[1] *= s; m.elements[2] *= s;
      m.elements[4] *= s; m.elements[5] *= s; m.elements[6] *= s;
      m.setPosition(P.x * r, P.y * r, P.z * r);
      this.trafficMesh.setMatrixAt(i, m);
    }
    this.trafficMesh.count = n;
    this.trafficMesh.instanceMatrix.needsUpdate = true;
  }

  _pickTraffic(clientX, clientY) {
    if (!this.trafficOn || this.mode !== '3d' || !this.trafficMesh.visible) return -1;
    const rect = this.renderer.domElement.getBoundingClientRect();
    const ndc = this._ndc || (this._ndc = new THREE.Vector2());
    ndc.set(((clientX - rect.left) / rect.width) * 2 - 1, -((clientY - rect.top) / rect.height) * 2 + 1);
    this.raycaster.setFromCamera(ndc, this.camera);
    this.raycaster.params.Mesh = { threshold: 0.01 };
    const hits = this.raycaster.intersectObjects([this.trafficMesh, this.earth], false);
    if (hits.length && hits[0].object === this.trafficMesh) return hits[0].instanceId;
    return -1;
  }

  /* ---------- flight API ---------- */

  setFlightRoute(dep, arr) {
    // clear previous arcs
    for (const m of (this._routeMeshes || [])) {
      m.parent && m.parent.remove(m);
      m.geometry.dispose(); m.material.dispose();
      const i = this.arcMats.indexOf(m.material);
      if (i >= 0) this.arcMats.splice(i, 1);
    }
    this._routeMeshes = [];

    const mkDep = this.markers.find(m => m.id === 'mk-dep');
    const mkArr = this.markers.find(m => m.id === 'mk-arr');

    if (dep && arr) {
      const gold = { colorA: '#e8edf7', colorB: '#ffc24b', radius: 0.0045, speed: 0.12, base: 0.35, phase: 0 };
      const arc3 = this._arcMesh(this._arcCurve(dep, arr, 1), gold);
      this.earthGroup.add(arc3);
      this._routeMeshes.push(arc3);
      this.arcMats.push(arc3.material);
      if (Math.abs(dep.lng - arr.lng) <= 180) {
        const arc2 = this._arcMesh(this._map2dArcCurve(dep, arr), { ...gold, radius: 0.006 });
        this.mapGroup.add(arc2);
        this._routeMeshes.push(arc2);
        this.arcMats.push(arc2.material);
      }
      if (mkDep) { mkDep.lat = dep.lat; mkDep.lng = dep.lng; }
      if (mkArr) { mkArr.lat = arr.lat; mkArr.lng = arr.lng; }
      const dl = document.getElementById('mk-dep-label'); if (dl) dl.textContent = dep.iata || dep.icao;
      const al = document.getElementById('mk-arr-label'); if (al) al.textContent = arr.iata || arr.icao;
      this.depGlow.position.copy(latLngToVec3(dep.lat, dep.lng, 1.012));
      this.arrGlow.position.copy(latLngToVec3(arr.lat, arr.lng, 1.012));
      this.depGlow.visible = this.arrGlow.visible = true;
      this._predDest = { lat: arr.lat, lng: arr.lng };
    } else {
      if (mkDep) mkDep.lat = mkDep.lng = null;
      if (mkArr) mkArr.lat = mkArr.lng = null;
      if (this.depGlow) this.depGlow.visible = false;
      if (this.arrGlow) this.arrGlow.visible = false;
      this._predDest = null;
    }
    this._updatePredLine();
  }

  setFlightState(s, label) {
    const first = !this.flightState;
    this.flightState = s;
    if (label) {
      const el = document.getElementById('mk-plane-label');
      if (el && el.textContent !== label) el.textContent = label;
    }
    if (first) {
      this.planeVec = latLngToVec3(s.lat, s.lng, 1).normalize();
      this._trailCount = 0;
      this._trailGeo.setDrawRange(0, 0);
      this._lastTrailT = 0;
    }
    this._updatePredLine();
  }

  // rebuild the dotted prediction line along the great circle to destination
  _updatePredLine() {
    if (!this.predLine) return;
    if (!this.flightState || !this.planeVec || !this._predDest) { this.predLine.visible = false; return; }
    const a = this.planeVec.clone().normalize();
    const b = latLngToVec3(this._predDest.lat, this._predDest.lng, 1).normalize();
    const omega = a.angleTo(b);
    if (omega < 0.006) { this.predLine.visible = false; return; }
    const sinO = Math.sin(omega);
    const N = 72;
    const pts = [];
    const r0 = this.planeR || 1.01, r1 = 1.005;
    for (let i = 0; i <= N; i++) {
      const t = i / N;
      const v = a.clone().multiplyScalar(Math.sin((1 - t) * omega) / sinO)
        .addScaledVector(b, Math.sin(t * omega) / sinO);
      pts.push(v.normalize().multiplyScalar(r0 + (r1 - r0) * t));
    }
    this.predLine.geometry.dispose();
    this.predLine.geometry = new THREE.BufferGeometry().setFromPoints(pts);
    this.predLine.computeLineDistances();
    this.predLine.visible = this.mode === '3d';
  }

  clearFlight() {
    this.flightState = null;
    this.planeVec = null;
    this.follow = false;
    this.setFlightRoute(null, null);
    this._trailCount = 0;
    this._trailGeo.setDrawRange(0, 0);
    this._predDest = null;
    if (this.predLine) this.predLine.visible = false;
  }

  setFollow(b) { this.follow = b; if (b) this.idleTime = -9999; }

  // secondary "watched" flights — up to two mini markers alongside the primary
  setWatched(list) {
    this.watchedFlights = (list || []).slice(0, 2);
    for (let i = 0; i < 2; i++) {
      const wf = this.watchedFlights[i];
      const lb = document.getElementById(`mk-w${i}-label`);
      if (lb && wf && lb.textContent !== wf.label) lb.textContent = wf.label;
    }
  }

  /* ---------- country borders & labels ---------- */

  async _buildBorders() {
    const res = await fetch(BORDERS_URL);
    const gj = await res.json();

    const pos3 = [], pos2 = [];
    const ll2map = (lat, lng) => [lng / 90, lat / 90];

    this.countryPolys = [];
    for (const f of gj.features || []) {
      let name = f.properties && (f.properties.name || f.properties.ADMIN);
      const geom = f.geometry;
      if (!geom) continue;
      const polys = geom.type === 'Polygon' ? [geom.coordinates] : (geom.type === 'MultiPolygon' ? geom.coordinates : []);

      let best = null, bestN = 0;
      let minLat = 90, maxLat = -90, minLng = 180, maxLng = -180;
      for (const poly of polys) {
        const ring = poly[0];
        if (!ring || ring.length < 2) continue;
        for (let i = 0; i < ring.length - 1; i++) {
          const [g1, t1] = ring[i], [g2, t2] = ring[i + 1];
          if (Math.abs(g1 - g2) > 180) continue;
          const a = latLngToVec3(t1, g1, 1.004), b = latLngToVec3(t2, g2, 1.004);
          pos3.push(a.x, a.y, a.z, b.x, b.y, b.z);
          const [x1, y1] = ll2map(t1, g1), [x2, y2] = ll2map(t2, g2);
          pos2.push(x1, y1, 0.004, x2, y2, 0.004);
        }
        for (const [g, t] of ring) {
          if (t < minLat) minLat = t; if (t > maxLat) maxLat = t;
          if (g < minLng) minLng = g; if (g > maxLng) maxLng = g;
        }
        if (ring.length > bestN) { bestN = ring.length; best = ring; }
      }

      if (best && name) {
        name = SHORT_NAMES[name] || name;
        // exact containment lookup (fixes e.g. Penang resolving to Thailand)
        this.countryPolys.push({ name, bbox: [minLng, minLat, maxLng, maxLat], polys });
        // label anchor: vertex average of the largest ring — lands on territory,
        // unlike the bbox centre (Malaysia's bbox centre is in the South China Sea)
        let sx = 0, sy = 0;
        for (const [g, t] of best) { sx += g; sy += t; }
        const lat = sy / best.length, lng = sx / best.length;
        const area = (maxLat - minLat) * (maxLng - minLng);
        const tier = area >= 150 ? 1 : (area >= 25 ? 2 : 3);
        this.countryCentroids.push({ name, lat, lng, tier });
      }
    }

    const mkLines = (arr) => {
      const g = new THREE.BufferGeometry();
      g.setAttribute('position', new THREE.BufferAttribute(Float32Array.from(arr), 3));
      return new THREE.LineSegments(g, new THREE.LineBasicMaterial({
        color: 0x8fb2e8, transparent: true, opacity: 0, depthWrite: false,
      }));
    };
    this.borders3d = mkLines(pos3);
    this.earthGroup.add(this.borders3d);
    this.borders2d = mkLines(pos2);
    this.mapGroup.add(this.borders2d);

    this.labelLayer = document.getElementById('country-label-layer');
    if (this.labelLayer) {
      const frag = document.createDocumentFragment();
      for (const c of this.countryCentroids) {
        const el = document.createElement('span');
        el.className = 'country-label';
        el.textContent = c.name;
        frag.appendChild(el);
        this.countryLabels.push({
          el, tier: c.tier,
          local3: latLngToVec3(c.lat, c.lng, 1.012),
          local2: new THREE.Vector3(c.lng / 90, c.lat / 90, 0.01),
        });
      }
      this.labelLayer.appendChild(frag);
    }
  }

  // exact point-in-polygon test (even-odd rule across each polygon's rings)
  countryContains(c, lat, lng) {
    const [w, s, e, n] = c.bbox;
    if (lng < w || lng > e || lat < s || lat > n) return false;
    for (const poly of c.polys) {
      let inside = false;
      for (const ring of poly) {
        for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
          const xi = ring[i][0], yi = ring[i][1], xj = ring[j][0], yj = ring[j][1];
          if (((yi > lat) !== (yj > lat)) && (lng < (xj - xi) * (lat - yi) / (yj - yi) + xi)) inside = !inside;
        }
      }
      if (inside) return true;
    }
    return false;
  }

  countryAt(lat, lng) {
    if (!this.countryPolys) return null;
    for (const c of this.countryPolys) if (this.countryContains(c, lat, lng)) return c.name;
    return null;
  }

  // resolve a typed name ("malaysia", "USA", "south k…") to a country record
  countryInfo(query) {
    if (!this.countryPolys) return null;
    const q = (query || '').trim().toLowerCase();
    const ALIAS = {
      usa: 'united states', america: 'united states', uk: 'united kingdom',
      britain: 'united kingdom', england: 'united kingdom', korea: 'south korea',
      holland: 'netherlands', emirates: 'uae', czechia: 'czech republic',
    };
    const want = ALIAS[q] || (q.length >= 3 ? q : null);
    if (!want) return null;
    const hit = this.countryPolys.find(c => c.name.toLowerCase() === want)
      || this.countryPolys.find(c => c.name.toLowerCase().startsWith(want))
      || this.countryPolys.find(c => c.name.toLowerCase().includes(want));
    if (!hit) return null;
    const cen = this.countryCentroids.find(cc => cc.name === hit.name);
    return {
      name: hit.name, bbox: hit.bbox, rec: hit,
      centroid: cen ? { lat: cen.lat, lng: cen.lng }
        : { lat: (hit.bbox[1] + hit.bbox[3]) / 2, lng: (hit.bbox[0] + hit.bbox[2]) / 2 },
    };
  }

  nearestCountry(lat, lng) {
    let best = null, bestD = Infinity;
    const cs = Math.cos(lat * DEG);
    for (const c of this.countryCentroids) {
      let dl = Math.abs(c.lng - lng); if (dl > 180) dl = 360 - dl;
      const d = (c.lat - lat) ** 2 + (dl * cs) ** 2;
      if (d < bestD) { bestD = d; best = c; }
    }
    return bestD < 144 ? best.name : null;
  }

  flyTo(lat, lng, dist) {
    this.rotTarget.x = Math.max(-1.2, Math.min(1.2, lat * DEG));
    const base = -(lng + 90) * DEG;
    const k = Math.round((this.rot.y - base) / (Math.PI * 2));
    this.rotTarget.y = base + k * Math.PI * 2;
    if (dist) this.distTarget = Math.max(this.MIN_DIST, Math.min(4.6, dist));
    this.vel.x = this.vel.y = 0;
    this.idleTime = -3;   // give the fly-to a moment to settle before idle spin resumes
    if (this.mode === '2d') {
      this.panTarget.x = Math.max(-1.7, Math.min(1.7, -lng / 90));
      this.panTarget.y = Math.max(-0.85, Math.min(0.85, -lat / 90));
    }
  }

  setUserLocation(lat, lng, name, fly = true) {
    this.home = { lat, lng, dist: (this.home && this.home.dist) || 2.7 };
    const mk = this.markers.find(m => m.id === 'mk-you');
    if (mk) { mk.lat = lat; mk.lng = lng; }
    const lb = document.getElementById('mk-you-label');
    if (lb && name) lb.textContent = name;
    if (fly) this.flyTo(lat, lng, Math.min(this.distTarget, 2.7));
  }

  _collectMarkers() {
    const defs = [
      { id: 'mk-you',   lat: null, lng: null, kind: 'pill' },
      { id: 'mk-dep',   lat: null, lng: null, kind: 'pill' },
      { id: 'mk-arr',   lat: null, lng: null, kind: 'pill' },
      { id: 'mk-plane', kind: 'plane' },
      { id: 'mk-w0',    kind: 'watch', idx: 0 },
      { id: 'mk-w1',    kind: 'watch', idx: 1 },
    ];
    this.markers = defs
      .map(d => ({ ...d, el: document.getElementById(d.id) }))
      .filter(d => d.el);
    // airport pills are clickable, but only while actually visible
    for (const mk of this.markers) mk.btn = mk.el.querySelector('button');
    this.planeIcon = document.getElementById('mk-plane-icon');
  }

  /* ---------- interaction ---------- */

  _bindEvents() {
    const el = this.renderer.domElement;
    let px = 0, py = 0, downX = 0, downY = 0, moved = 0;

    el.addEventListener('pointerdown', (e) => {
      this.dragging = true;
      this.idleTime = 0;
      px = downX = e.clientX; py = downY = e.clientY; moved = 0;
      this.vel.x = this.vel.y = 0;
      if (this.follow) { this.follow = false; this.opts.onFollowBreak && this.opts.onFollowBreak(); }
      el.classList.add('dragging');
      el.setPointerCapture(e.pointerId);
    });
    el.addEventListener('pointermove', (e) => {
      if (!this.dragging) {
        // hover pick for the traffic layer (throttled)
        const now = performance.now();
        if (now - (this._lastHoverT || 0) > 50) {
          this._lastHoverT = now;
          const id = this._pickTraffic(e.clientX, e.clientY);
          this.trafficHover = id;
          const tip = document.getElementById('traffic-tip');
          if (tip) {
            if (id >= 0 && this.traffic[id]) {
              const t = this.traffic[id];
              tip.textContent = `${t.callsign} · ${t.alt ? t.alt.toLocaleString() + ' ft' : '—'} · ${Math.round(t.gs)} kt`;
              tip.style.transform = `translate(${e.clientX + 14}px, ${e.clientY - 30}px)`;
              tip.style.opacity = '1';
              el.style.cursor = 'pointer';
            } else {
              tip.style.opacity = '0';
              el.style.cursor = '';
            }
          }
        }
        return;
      }
      const dx = e.clientX - px, dy = e.clientY - py;
      px = e.clientX; py = e.clientY;
      moved += Math.abs(dx) + Math.abs(dy);
      this.idleTime = 0;
      if (this.mode === '3d') {
        const k = 0.0038 * (this.dist / this.DIST0);
        this.rotTarget.y += dx * k;
        this.rotTarget.x += dy * k * 0.85;
        this.rotTarget.x = Math.max(-1.2, Math.min(1.2, this.rotTarget.x));
        this.vel.y = dx * k; this.vel.x = dy * k * 0.85;
      } else {
        const k = 0.0011 * this.dist;
        this.panTarget.x = Math.max(-1.7, Math.min(1.7, this.panTarget.x + dx * k));
        this.panTarget.y = Math.max(-0.85, Math.min(0.85, this.panTarget.y - dy * k));
      }
    });
    const end = (e) => {
      if (!this.dragging) return;
      this.dragging = false;
      el.classList.remove('dragging');
      try { el.releasePointerCapture(e.pointerId); } catch (_) {}
      // a click (not a drag) on a traffic dart starts tracking that flight
      if (moved < 6 && e.type === 'pointerup') {
        const id = this._pickTraffic(e.clientX, e.clientY);
        if (id >= 0 && this.traffic[id] && this.opts.onTrafficPick) {
          this.opts.onTrafficPick(this.traffic[id], { x: e.clientX, y: e.clientY });
        }
      }
    };
    el.addEventListener('pointerup', end);
    el.addEventListener('pointercancel', end);

    el.addEventListener('wheel', (e) => {
      e.preventDefault();
      this.idleTime = 0;
      this.zoomBy(1 + Math.sign(e.deltaY) * 0.12);
    }, { passive: false });

    this._resizeObs = new ResizeObserver(() => {
      const w = this.host.clientWidth, h = this.host.clientHeight;
      if (!w || !h) return;
      this.camera.aspect = w / h;
      this.camera.updateProjectionMatrix();
      this.renderer.setSize(w, h);
    });
    this._resizeObs.observe(this.host);
  }

  zoomBy(f) {
    const [min, max] = this.mode === '3d' ? [this.MIN_DIST, 4.6] : [0.85, 3.2];
    this.distTarget = Math.max(min, Math.min(max, this.distTarget * f));
  }

  resetView() {
    if (this.flightState && this.planeVec) {
      const p = vec3ToLatLng(this.planeVec);
      this.flyTo(p.lat, p.lng, 2.0);
      return;
    }
    const h = this.home;
    if (h) { this.flyTo(h.lat, h.lng, h.dist || 2.2); return; }
    this.rotTarget.x = 0.16;
    this.rotTarget.y = Math.round(this.rot.y / (Math.PI * 2)) * Math.PI * 2;
    this.panTarget.x = 0; this.panTarget.y = 0;
    this.distTarget = this.mode === '3d' ? this.DIST0 : 1.9;
    this.vel.x = this.vel.y = 0;
  }

  setNight(b) { this.isNight = b; this.sunTarget = b
    ? new THREE.Vector3(-0.55, 0.22, -0.85).normalize()
    : new THREE.Vector3(0.55, 0.32, 0.85).normalize(); }

  /* ---------- user settings ---------- */

  setClouds(b) {
    this.cloudsOn = b;
    if (this.clouds) this.clouds.visible = b && this.mode === '3d';
  }

  setLabels(b) {
    this.labelsOn = b;
    if (!b && this.labelLayer) this.labelLayer.style.visibility = 'hidden';
  }

  setQuality(cap) {   // pixel-ratio ceiling: 1.5 balanced · 2.5 high · 3.5 ultra
    if (!this.renderer) return;
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, cap));
    this.renderer.setSize(this.host.clientWidth, this.host.clientHeight);
  }

  setMode(m) {
    if (m === this.mode) return;
    const focus = this._frontLatLng();
    const fade = document.getElementById('mode-fade');
    fade.style.opacity = '1';
    setTimeout(() => {
      this.mode = m;
      const is3d = m === '3d';
      this.earthGroup.visible = is3d;
      this.ring.visible = is3d;
      if (this.clouds) this.clouds.visible = is3d && this.cloudsOn !== false;
      this.mapGroup.visible = !is3d;
      this._updateWeatherVis();
      this._updatePredLine();
      this.distTarget = is3d ? this.DIST0 : 1.9;
      this.dist = this.distTarget + 0.3;
      if (is3d) {
        this.rot.x = this.rotTarget.x = Math.max(-1.2, Math.min(1.2, focus.lat * DEG));
        this.rot.y = this.rotTarget.y = -(focus.lng + 90) * DEG;
      } else {
        this.pan.x = this.panTarget.x = Math.max(-1.7, Math.min(1.7, -focus.lng / 90));
        this.pan.y = this.panTarget.y = Math.max(-0.85, Math.min(0.85, -focus.lat / 90));
      }
      this.vel.x = this.vel.y = 0;
      fade.style.opacity = '0';
    }, 230);
  }

  /* ---------- frame loop ---------- */

  _loop() {
    if (this.disposed) return;
    this._lastLoopAt = performance.now();
    const dt = Math.min(this.clock ? this.clock.getDelta() : 0.016, 0.05);
    const t = this.clock ? this.clock.elapsedTime : 0;

    if (!this.dragging && this.mode === '3d') {
      this.vel.x *= 0.94; this.vel.y *= 0.94;
      if (Math.abs(this.vel.y) > 0.00002 || Math.abs(this.vel.x) > 0.00002) {
        this.rotTarget.y += this.vel.y;
        this.rotTarget.x = Math.max(-1.2, Math.min(1.2, this.rotTarget.x + this.vel.x));
      }
    }

    // idle auto-rotate — kicks in 2s after the user stops interacting,
    // only in wide view, never while following a flight
    this.idleTime += dt;
    if (this.idleTime > 2 && this.mode === '3d' && !this.dragging && this.dist > 2.6 && !this.follow) {
      this.rotTarget.y += dt * 0.02;
    }

    // 2D: keep the map filling the viewport — clamp panning so its edges
    // never drift inside the visible area (depends on zoom and aspect)
    if (this.mode === '2d') {
      const halfH = Math.tan(this.camera.fov * DEG / 2) * this.dist;
      const halfW = halfH * this.camera.aspect;
      const maxX = Math.max(0, 2 - halfW), maxY = Math.max(0, 1 - halfH);
      this.panTarget.x = Math.max(-maxX, Math.min(maxX, this.panTarget.x));
      this.panTarget.y = Math.max(-maxY, Math.min(maxY, this.panTarget.y));
      this.pan.x = Math.max(-maxX, Math.min(maxX, this.pan.x));
      this.pan.y = Math.max(-maxY, Math.min(maxY, this.pan.y));
    }

    // live flight: extrapolate along track between polls (dead reckoning)
    if (this.flightState && this.planeVec) {
      const fs = this.flightState;
      const age = Math.min(Math.max((Date.now() - fs.rx) / 1000, 0), 600);
      const delta = ((fs.gs || 0) * 0.514444 * age) / 6371000;   // knots → rad
      const tgt = destPoint(fs.lat, fs.lng, fs.track || 0, delta);
      const tv = latLngToVec3(tgt.lat, tgt.lng, 1).normalize();
      const k = 1 - Math.pow(0.02, dt);
      this.planeVec.lerp(tv, k).normalize();
      const ll = vec3ToLatLng(this.planeVec);
      this.planeLat = ll.lat; this.planeLng = ll.lng;
      const altFt = typeof fs.alt === 'number' ? fs.alt : 0;
      this.planeR = 1.006 + Math.min(Math.max(altFt, 0), 45000) / 45000 * 0.022;

      // grow the flown trail (and keep the prediction line anchored to the nose)
      if (t - (this._lastTrailT || 0) > 1.5 && this._trailCount < this._trailMax) {
        this._lastTrailT = t;
        const p = this.planeVec.clone().multiplyScalar(this.planeR);
        this._trailPos.set([p.x, p.y, p.z], this._trailCount * 3);
        this._trailCount++;
        this._trailGeo.setDrawRange(0, this._trailCount);
        this._trailGeo.attributes.position.needsUpdate = true;
        this._updatePredLine();
      }

      if (this.follow && !this.dragging) {
        this.rotTarget.x = Math.max(-1.2, Math.min(1.2, this.planeLat * DEG));
        const base = -(this.planeLng + 90) * DEG;
        const kk = Math.round((this.rot.y - base) / (Math.PI * 2));
        this.rotTarget.y = base + kk * Math.PI * 2;
      }
    }

    const damp = 1 - Math.pow(0.0001, dt);
    this.rot.x += (this.rotTarget.x - this.rot.x) * damp;
    this.rot.y += (this.rotTarget.y - this.rot.y) * damp;
    this.pan.x += (this.panTarget.x - this.pan.x) * damp;
    this.pan.y += (this.panTarget.y - this.pan.y) * damp;
    this.dist  += (this.distTarget - this.dist) * (1 - Math.pow(0.001, dt));

    if (this.earthGroup) this.earthGroup.rotation.set(this.rot.x, this.rot.y, 0);
    if (this.mapGroup) this.mapGroup.position.set(this.pan.x, this.pan.y, 0);
    this.camera.position.z = this.dist;

    this.sunCur.lerp(this.sunTarget, Math.min(1, dt * 2.4)).normalize();
    if (this.earthMat) {
      this.earthMat.uniforms.sunDir.value.copy(this.sunCur);
      // close-zoom micro-detail fades in as the camera approaches the surface
      this.earthMat.uniforms.uDetailAmt.value = Math.max(0, Math.min(1, (2.05 - this.dist) / 0.55));
    }
    if (this.atmoMat) this.atmoMat.uniforms.sunDir.value.copy(this.sunCur);
    if (this.cloudMat) {
      this.cloudMat.uniforms.sunDir.value.copy(this.sunCur);
      const o = this.cloudMat.uniforms.uOpacity;
      const tgt = this._cloudOpacityTarget || 0;
      if (Math.abs(o.value - tgt) > 0.001) o.value += (tgt - o.value) * Math.min(1, dt * 1.6);
    }
    this.sunLight.position.copy(this.sunCur).multiplyScalar(5);
    this.nightMix += ((this.isNight ? 1 : 0) - this.nightMix) * Math.min(1, dt * 2.4);
    if (this.nightPlane) this.nightPlane.material.opacity = this.nightMix;

    // radar loop: step through the recent frames, dwell on the newest
    if (this.wxFrames && this.wxFrames.length > 1 && this.weatherOn) {
      this._wxClock = (this._wxClock || 0) + dt;
      const per = 0.75, dwell = 2.2, n = this.wxFrames.length;
      const tt = this._wxClock % (per * (n - 1) + dwell);
      const idx = Math.min(n - 1, Math.floor(tt / per));
      if (idx !== this._wxIdx) {
        this._wxIdx = idx;
        this.weatherMat.map = this.wxFrames[idx].tex;
      }
    }

    if (this.clouds) this.clouds.rotation.y += dt * 0.006;
    this.stars.rotation.y += dt * 0.0035;
    this.ring.quaternion.copy(this.camera.quaternion);

    for (const m of this.arcMats) m.uniforms.uTime.value = t;

    // borders fade in with zoom
    if (this.borders3d) {
      const a3 = Math.max(0, Math.min(1, (2.9 - this.dist) / 0.7)) * 0.55;
      this.borders3d.material.opacity = a3;
      this.borders2d.material.opacity = Math.max(0.22, Math.max(0, Math.min(1, (2.6 - this.dist) / 1.0)) * 0.5);
    }

    this._updateTraffic();
    this._updateMarkers();
    this._updateCountryLabels();
    this._updateCoords();

    this.renderer.render(this.scene, this.camera);
  }

  _project(worldPos, out) {
    const v = this._v.copy(worldPos).project(this.camera);
    out.x = (v.x * 0.5 + 0.5) * this.host.clientWidth;
    out.y = (-v.y * 0.5 + 0.5) * this.host.clientHeight;
    out.behind = v.z > 1 || !isFinite(out.x) || !isFinite(out.y);
    if (out.behind) { out.x = -9999; out.y = -9999; }
    return out;
  }

  _updateMarkers() {
    const is3d = this.mode === '3d';
    const camDir = this._camDir || (this._camDir = new THREE.Vector3());
    camDir.copy(this.camera.position).normalize();
    const camDirLocal = this._camDirLocal || (this._camDirLocal = new THREE.Vector3());
    camDirLocal.copy(camDir).applyQuaternion(
      (this._qInv || (this._qInv = new THREE.Quaternion())).copy(this.earthGroup ? this.earthGroup.quaternion : new THREE.Quaternion()).invert()
    );
    const scr = this._scr || (this._scr = {});
    const wp = this._wp || (this._wp = new THREE.Vector3());
    const wp2 = this._wpB || (this._wpB = new THREE.Vector3());

    for (const mk of this.markers) {
      let facing = 1;

      if (mk.kind === 'watch') {
        const wf = (this.watchedFlights || [])[mk.idx];
        if (!wf) { mk.el.style.opacity = '0'; continue; }
        // same dead-reckoning as the traffic layer, one marker per watched flight
        const age = Math.min(Math.max((Date.now() - (wf.rx || 0)) / 1000, 0), 600);
        const delta = ((wf.gs || 0) * 0.514444 * age) / 6371000;
        const p = delta > 0 ? destPoint(wf.lat, wf.lng, wf.track || 0, delta) : wf;
        const altFt = typeof wf.alt === 'number' ? wf.alt : 0;
        const r = 1.006 + Math.min(Math.max(altFt, 0), 45000) / 45000 * 0.022;
        if (is3d) {
          wp.copy(latLngToVec3(p.lat, p.lng, 1)).normalize();
          facing = wp.dot(camDirLocal);
          wp.multiplyScalar(r).applyMatrix4(this.earthGroup.matrixWorld);
        } else {
          wp.set(p.lng / 90, p.lat / 90, 0.012).applyMatrix4(this.mapGroup.matrixWorld);
        }
        this._project(wp, scr);
      } else if (mk.kind === 'plane') {
        if (!this.flightState || !this.planeVec) { mk.el.style.opacity = '0'; continue; }
        if (is3d) {
          wp.copy(this.planeVec).multiplyScalar(this.planeR);
          facing = this.planeVec.dot(camDirLocal);
          wp.applyMatrix4(this.earthGroup.matrixWorld);
        } else {
          wp.set(this.planeLng / 90, this.planeLat / 90, 0.012).applyMatrix4(this.mapGroup.matrixWorld);
        }
        if (this.planeIcon) {
          // orient the icon along the current track
          const ahead = destPoint(this.planeLat, this.planeLng, this.flightState.track || 0, 0.012);
          if (is3d) {
            wp2.copy(latLngToVec3(ahead.lat, ahead.lng, 1).normalize().multiplyScalar(this.planeR)).applyMatrix4(this.earthGroup.matrixWorld);
          } else {
            wp2.set(ahead.lng / 90, ahead.lat / 90, 0.012).applyMatrix4(this.mapGroup.matrixWorld);
          }
          const p1 = this._pA || (this._pA = {}), p2 = this._pB || (this._pB = {});
          this._project(wp, p1); this._project(wp2, p2);
          const ang = Math.atan2(p2.x - p1.x, -(p2.y - p1.y)) * 180 / Math.PI;
          this.planeIcon.style.transform = `rotate(${ang.toFixed(1)}deg)`;
          this._project(wp, scr);
        } else {
          this._project(wp, scr);
        }
      } else {
        if (mk.lat == null) {
          mk.el.style.opacity = '0';
          if (mk.btn) mk.btn.style.pointerEvents = 'none';
          continue;
        }
        if (is3d) {
          wp.copy(latLngToVec3(mk.lat, mk.lng, 1.005));
          facing = wp.clone().normalize().dot(camDirLocal);
          wp.applyMatrix4(this.earthGroup.matrixWorld);
        } else {
          wp.set(mk.lng / 180 * 2, mk.lat / 90, 0.01).applyMatrix4(this.mapGroup.matrixWorld);
        }
        this._project(wp, scr);
      }

      const vis = scr.behind ? 0 : Math.max(0, Math.min(1, (facing - 0.08) / 0.2));
      mk.el.style.opacity = vis.toFixed(2);
      if (mk.btn) mk.btn.style.pointerEvents = vis > 0.2 ? 'auto' : 'none';
      const anchor = mk.kind === 'pill' ? 'translate(-50%, -100%)' : 'translate(-50%, -50%)';
      mk.el.style.transform = `${anchor} translate(${scr.x.toFixed(1)}px, ${scr.y.toFixed(1)}px)`;
      mk.el.style.zIndex = mk.kind === 'plane' ? 6 : 5;
    }
  }

  _updateCountryLabels() {
    if (!this.labelLayer || !this.countryLabels.length || this.labelsOn === false) return;
    const is3d = this.mode === '3d';
    const d = this.dist;
    const zoomA = is3d
      ? Math.max(0, Math.min(1, (2.75 - d) / 0.55))
      : Math.max(0, Math.min(1, (2.55 - d) / 0.75));
    if (zoomA <= 0.02) {
      if (this.labelLayer.style.visibility !== 'hidden') this.labelLayer.style.visibility = 'hidden';
      return;
    }
    if (this.labelLayer.style.visibility !== 'visible') this.labelLayer.style.visibility = 'visible';

    const gates = is3d ? [9, 2.75, 2.45, 1.95] : [9, 2.55, 2.05, 1.6];
    const camDir = (this._camDir2 || (this._camDir2 = new THREE.Vector3()))
      .copy(this.camera.position).normalize()
      .applyQuaternion((this._q || (this._q = new THREE.Quaternion())).copy(this.earthGroup.quaternion).invert());
    const wp = this._wp2 || (this._wp2 = new THREE.Vector3());
    const scr = this._scr2 || (this._scr2 = {});

    for (const lb of this.countryLabels) {
      if (d > gates[lb.tier]) { lb.el.style.opacity = '0'; continue; }
      let fade = 1;
      if (is3d) {
        fade = Math.max(0, Math.min(1, ((lb.local3.dot(camDir) / 1.012) - 0.25) / 0.2));
        if (fade <= 0) { lb.el.style.opacity = '0'; continue; }
        wp.copy(lb.local3).applyMatrix4(this.earthGroup.matrixWorld);
      } else {
        wp.copy(lb.local2).applyMatrix4(this.mapGroup.matrixWorld);
      }
      this._project(wp, scr);
      if (scr.behind) { lb.el.style.opacity = '0'; continue; }
      lb.el.style.opacity = (zoomA * fade * 0.9).toFixed(2);
      lb.el.style.transform = `translate(-50%, -50%) translate(${scr.x.toFixed(1)}px, ${scr.y.toFixed(1)}px)`;
    }
  }

  _frontLatLng() {
    if (this.mode === '3d') {
      const q = this.earthGroup.quaternion.clone().invert();
      const dv = new THREE.Vector3(0, 0, 1).applyQuaternion(q);
      const lat = 90 - Math.acos(Math.max(-1, Math.min(1, dv.y))) / DEG;
      let lng = Math.atan2(dv.z, -dv.x) / DEG - 180;
      if (lng < -180) lng += 360;
      return { lat, lng };
    }
    return { lat: -this.pan.y * 90, lng: -this.pan.x * 90 };
  }

  _updateCoords() {
    const ex = document.getElementById('coord-x');
    const ey = document.getElementById('coord-y');
    if (!ex || !ey) return;
    const f = this._frontLatLng();
    ex.textContent = f.lat.toFixed(6);
    ey.textContent = f.lng.toFixed(6);
  }

  dispose() {
    this.disposed = true;
    if (this._ticker) clearInterval(this._ticker);
    if (this._wxTimer) clearInterval(this._wxTimer);
    if (this._nmCancel) this._nmCancel();
    if (this.renderer) {
      this.renderer.setAnimationLoop(null);
      this.renderer.dispose();
      this.renderer.domElement.remove();
    }
    this._resizeObs && this._resizeObs.disconnect();
  }
}

/* ---------- flight search + status card ---------- */

function phaseOf(live) {
  if (!live) return '—';
  if (live.alt === 'ground') return 'On Ground';
  if (live.baroRate > 400) return 'Climbing';
  if (live.baroRate < -400) return 'Descending';
  return 'Cruising';
}

function fmtEta(km, gs) {
  if (!km || !gs || gs < 60) return '—';
  const h = km / (gs * 1.852);
  const H = Math.floor(h), M = Math.round((h - H) * 60);
  return H > 0 ? `${H}h ${String(M).padStart(2, '0')}m` : `${M}m`;
}

function Spark({ data, accent }) {
  const arr = data.length ? data : [0];
  const max = Math.max(...arr, 1);
  const bars = Array.from({ length: 14 }, (_, i) => arr[arr.length - 14 + i]);
  return (
    <div className="flex items-end gap-[3px] h-9 mt-2.5 justify-end">
      {bars.map((v, i) => (
        <div key={i} style={{ height: `${v == null ? 4 : Math.max(8, v / max * 100)}%` }}
          className={`w-[5px] rounded-[2px] transition-all duration-500 ${
            v == null ? 'bg-white/[0.05]'
            : i >= 12
              ? (accent === 'amber'
                  ? 'bg-gradient-to-t from-amber-500/70 to-amber-300 shadow-[0_0_10px_rgba(251,191,36,0.45)]'
                  : 'bg-gradient-to-t from-sky-500/70 to-cyan-300 shadow-[0_0_10px_rgba(56,189,248,0.45)]')
              : 'bg-gradient-to-t from-sky-700/40 to-sky-500/55'
          }`}></div>
      ))}
    </div>
  );
}

function Telemetry({ flight, units }) {
  const live = flight && flight.live;
  const alt = live ? (live.alt === 'ground' ? 'GND' : (typeof live.alt === 'number' ? live.alt.toLocaleString() : '—')) : '—';
  const kmh = units === 'kmh';
  const gs = live && live.gs ? Math.round(kmh ? live.gs * 1.852 : live.gs) : '—';
  return (
    <div className="absolute right-[7%] top-[33%] z-10 text-right select-none">
      <h3 className="font-display text-[19px] font-normal text-slate-200 leading-snug mb-5">Live<br />Telemetry</h3>

      <div className="mb-6">
        <div className="text-[9px] uppercase tracking-[0.22em] text-slate-500 mb-1">Altitude</div>
        <div className="flex items-baseline justify-end gap-1.5">
          <span className="font-display text-[30px] font-semibold text-slate-50 leading-none">{alt}</span>
          <span className="text-[10px] text-slate-500 font-mono">{live && live.alt !== 'ground' ? 'ft' : ''}</span>
        </div>
        <Spark data={flight ? flight.histAlt : []} />
      </div>

      <div>
        <div className="text-[9px] uppercase tracking-[0.22em] text-slate-500 mb-1">Ground Speed</div>
        <div className="flex items-baseline justify-end gap-1.5">

const fmtN = (v, d = 0) => (typeof v === 'number' && isFinite(v)) ? v.toLocaleString(undefined, { maximumFractionDigits: d }) : null;

function initialBearing(a, b) {
  const φ1 = a.lat * DEG, φ2 = b.lat * DEG, dλ = (b.lng - a.lng) * DEG;
  const θ = Math.atan2(Math.sin(dλ) * Math.cos(φ2), Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(dλ));
  return ((θ / DEG) + 360) % 360;
}
