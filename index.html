/* Live radar — real-time list of everything flying around the view */
function RadarDrawer({ on, list, updatedAt, onEnable, onRow, onClose }) {
  const [sort, setSort] = useState('nearest');
  const sorted = React.useMemo(() => {
    const l = [...list];
    if (sort === 'highest') l.sort((a, b) => (b.alt || 0) - (a.alt || 0));
    else if (sort === 'fastest') l.sort((a, b) => (b.gs || 0) - (a.gs || 0));
    return l;   // 'nearest' comes pre-sorted
  }, [list, sort]);

  const stats = React.useMemo(() => {
    if (!list.length) return null;
    const highest = list.reduce((m, t) => (t.alt > m.alt ? t : m), list[0]);
    const fastest = list.reduce((m, t) => (t.gs > m.gs ? t : m), list[0]);
    const byAirline = {};
    for (const t of list) { const n = airlineName(t.callsign); if (n) byAirline[n] = (byAirline[n] || 0) + 1; }
    const top = Object.entries(byAirline).sort((a, b) => b[1] - a[1]).slice(0, 3);
    return { highest, fastest, top };
  }, [list]);

  const emergencies = list.filter(t => SQUAWK_ALERTS[t.squawk]);
  const seg = (v, l) => (
    <button onClick={() => setSort(v)}
      className={`flex-1 rounded-lg py-1.5 text-[9px] font-semibold uppercase tracking-wider transition-all duration-200 ${
        sort === v ? 'bg-cyan-400/90 text-[#04283B]' : 'bg-white/[0.05] text-slate-400 hover:bg-white/[0.1]'}`}>{l}</button>
  );

  return (
    <DrawerShell title="Live Radar" sub={on ? `${list.length} aircraft · updated ${updatedAt ? new Date(updatedAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '—'}` : 'Radar is off'} onClose={onClose}>
      {!on ? (
        <div className="mt-2">
          <div className="text-[12px] text-slate-400 leading-relaxed mb-4">
            Turn on the traffic radar to stream every aircraft within 250 nm of your
            view, refreshed live from the ADS-B network.

const famousStatusCache = { ts: 0, map: {} };

function FamousDrawer({ onPick, onClose }) {
  const [status, setStatus] = useState(famousStatusCache.map);
  useEffect(() => {
    let stop = false;
    const sweep = async () => {
      for (const f of FAMOUS_FLIGHTS) {
        if (stop) return;
        try {
          const j = await fetchJson('https://api.airplanes.live/v2/callsign/' + f.cs, undefined, 6000);
          const ac = (j.ac || []).find(a => a.lat != null);
          famousStatusCache.map = {
            ...famousStatusCache.map,
            [f.code]: ac
              ? { live: true, alt: typeof ac.alt_baro === 'number' ? ac.alt_baro : null, gs: ac.gs || null }
              : { live: false },
          };
          famousStatusCache.ts = Date.now();
          if (!stop) setStatus({ ...famousStatusCache.map });
        } catch (e) { /* skip */ }
        await new Promise(r => setTimeout(r, 350));   // stay well under the API rate limit
      }
    };
    if (Date.now() - famousStatusCache.ts > 60000) sweep();
    const iv = setInterval(sweep, 90000);             // keep refreshing while the menu is open
    return () => { stop = true; clearInterval(iv); };
  }, []);

  return (
    <DrawerShell title="Famous Flights" sub="The world's legendary routes" onClose={onClose}>
      <div className="flex flex-col gap-2">
        {FAMOUS_FLIGHTS.map(f => {
          const st = status[f.code];
          const live = st && st.live;
          return (
            <button key={f.code} onClick={() => onPick(f.code)}
              className="text-left rounded-xl border border-white/[0.06] bg-white/[0.025] hover:bg-white/[0.06] hover:border-amber-300/25 transition-all duration-200 px-3.5 py-3 group">
              <div className="flex items-center justify-between">
                <span className="font-mono font-bold text-[13px] text-slate-100 group-hover:text-amber-300 transition-colors">{f.code}</span>
                <span className={`flex items-center gap-1.5 text-[8.5px] uppercase tracking-[0.15em] ${
                  live ? 'text-emerald-300' : st ? 'text-slate-600' : 'text-slate-500'}`}>
                  <span className={`w-1.5 h-1.5 rounded-full ${live ? 'bg-emerald-400 animate-pulse' : st ? 'bg-slate-600' : 'bg-slate-500/50'}`}></span>
                  {live ? 'Airborne' : st ? 'On ground' : 'Checking…'}
                </span>
              </div>
              <div className="text-[11.5px] text-slate-300 mt-1">{f.route}</div>
              <div className="text-[9.5px] text-slate-500 mt-0.5">{f.note}</div>
              {live && (st.alt || st.gs) && (
                <div className="text-[9px] font-mono text-emerald-300/80 mt-1">
                  {st.alt ? st.alt.toLocaleString() + ' ft' : ''}{st.alt && st.gs ? ' · ' : ''}{st.gs ? Math.round(st.gs) + ' kt' : ''} — live now
                </div>
              )}
            </button>
          );
        })}
      </div>
      <div className="text-[9.5px] text-slate-600 leading-relaxed mt-4">
        Status is checked live against the ADS-B network. Long-haul flagships spend
        most of the day airborne — green ones can be tracked right now.
      </div>
    </DrawerShell>
  );
}

/* Country mode — search a country name to sweep its sky, in-transit first */
const COUNTRY_PHASES = [
  ['transit',   'In transit', 'text-sky-300',     'airborne · enroute'],
  ['departing', 'Departing',  'text-emerald-300', 'just off the ground · climbing'],
  ['arriving',  'Arriving',   'text-amber-300',   'on descent'],
  ['standby',   'On standby', 'text-slate-400',   'on the ground · taxiing or parked'],
];

function CountryDrawer({ view, onRow, onClose }) {
  if (!view || !view.info) return null;
  const list = view.list || [];
  const counts = COUNTRY_PHASES.map(([k]) => list.filter(t => t.phase === k).length);
  return (
    <DrawerShell title={view.info.name}
      sub={view.loading
        ? 'Sweeping the sky…'
        : `${list.length} aircraft · updated ${view.at ? new Date(view.at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '—'}`}
      onClose={onClose}>
      {!view.loading && list.length > 0 && (
        <div className="flex flex-wrap gap-1.5 mb-4">
          {COUNTRY_PHASES.map(([k, label, tone], i) => counts[i] > 0 && (
            <span key={k} className={`text-[9px] uppercase tracking-[0.14em] font-semibold rounded-full px-2 py-1 bg-white/[0.05] border border-white/[0.07] ${tone}`}>
              {counts[i]} {label}
            </span>
          ))}
        </div>
      )}
      {!view.loading && list.length === 0 && (
        <div className="text-[12px] text-slate-400 leading-relaxed">
          No transponders visible over {view.info.name} right now. Coverage depends on
          volunteer ADS-B receivers — try a busier region or time of day.
        </div>
      )}
      {COUNTRY_PHASES.map(([key, label, tone, hint]) => {
        const rows = list.filter(t => t.phase === key);
        if (!rows.length) return null;
        const sorted = [...rows].sort((a, b) =>
          key === 'transit' ? (b.alt || 0) - (a.alt || 0)
            : key === 'standby' ? (b.gs || 0) - (a.gs || 0)
            : (a.alt || 0) - (b.alt || 0));
        return (
          <div key={key} className="mb-4">
            <div className={`text-[9px] uppercase tracking-[0.24em] font-semibold mb-2 ${tone}`}>
              {label} · {rows.length}
              <span className="text-slate-600 normal-case tracking-normal font-normal"> — {hint}</span>
            </div>
            <div className="flex flex-col gap-1.5">
              {sorted.slice(0, 18).map(t => (
                <button key={t.hex} onClick={() => onRow(t)}
                  className="text-left rounded-xl border border-white/[0.05] bg-white/[0.02] hover:bg-white/[0.06] hover:border-cyan-300/25 transition-all duration-200 px-3 py-2 flex items-center justify-between gap-2">
                  <div className="min-w-0">
                    <div className="font-mono font-bold text-[11.5px] text-slate-100">{t.callsign}
                      <span className="ml-2 font-normal text-slate-500 text-[9.5px]">{airlineName(t.callsign) || typeName(t.type)}</span>
                    </div>
                    <div className="text-[9px] text-slate-500 font-mono mt-0.5">
                      {key === 'standby'
                        ? (t.gs > 8 ? `taxiing · ${Math.round(t.gs)} kt` : 'parked · transponder on')
                        : `${typeof t.alt === 'number' ? t.alt.toLocaleString() + ' ft' : '—'} · ${Math.round(t.gs)} kt${(key === 'departing' || key === 'arriving') ? ` · ${t.vr > 0 ? '+' : ''}${fmtN(t.vr)} fpm` : ''}`}
                    </div>
                  </div>
                  <Icon d="plane" size={11} stroke={0} className={`fill-current shrink-0 ${tone}`} />
                </button>
              ))}
              {rows.length > 18 && <div className="text-[9px] text-slate-600">+{rows.length - 18} more</div>}
            </div>
          </div>
        );
      })}
      <div className="text-[9.5px] text-slate-600 leading-relaxed mt-2">
        Keyless ADS-B carries no schedules — these states are inferred live from
        altitude, climb rate and ground movement.
        {view.samples > 1 ? ` Swept ${view.samples} areas across the country.` : ''}
        {' '}Click a flight to see its route, then track it.
      </div>
    </DrawerShell>
  );
}

/* ---------- bottom sheet: flight details ---------- */

function ProgressGauge({ pct }) {
  const R = 40, C = 2 * Math.PI * R;
  const v = pct == null ? 0 : pct;
  return (
    <div className="relative w-[110px] h-[110px] shrink-0">
      <svg viewBox="0 0 100 100" className="w-full h-full -rotate-90">
        <circle cx="50" cy="50" r={R} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="7" />
        <circle cx="50" cy="50" r={R} fill="none" stroke="url(#progGrad)" strokeWidth="7" strokeLinecap="round"
          strokeDasharray={`${C * v / 100} ${C}`} style={{ transition: 'stroke-dasharray 1s ease' }} />
        <defs>
          <linearGradient id="progGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor="#F5A623" /><stop offset="100%" stopColor="#FFD98A" />
          </linearGradient>
        </defs>
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <span className="font-display text-[24px] font-semibold text-slate-50 leading-none">{pct == null ? '—' : Math.round(pct) + '%'}</span>
        <span className="text-[8px] uppercase tracking-[0.2em] text-slate-500 mt-1">Complete</span>
      </div>
    </div>
  );
}

function AirportBlock({ tag, tone, ap, onClick }) {
  const clickable = !!(ap && ap.lat != null && onClick);
  return (
    <div onClick={clickable ? () => onClick(ap) : undefined}
      title={clickable ? 'View live traffic at this airport' : undefined}
      className={`flex-1 min-w-0 rounded-xl border border-white/[0.06] bg-white/[0.03] p-4 ${
        clickable ? 'cursor-pointer hover:bg-white/[0.06] hover:border-cyan-300/25 transition-all duration-200' : ''}`}>
      <div className={`text-[8.5px] font-bold uppercase tracking-[0.22em] mb-2 ${tone}`}>{tag}</div>
      <div className="flex items-baseline gap-2">
        <span className="font-display text-[26px] font-semibold text-slate-50 leading-none">{ap ? ap.iata : '—'}</span>
        <span className="font-mono text-[10px] text-slate-500">{ap ? ap.icao : ''}</span>
      </div>
      <div className="text-[11px] text-slate-300 mt-1.5 truncate">{ap ? ap.name : 'Unknown'}</div>
      <div className="text-[9.5px] text-slate-500 mt-0.5 truncate">{ap ? [ap.region, ap.country].filter(Boolean).join(' · ') : ''}</div>
    </div>
  );
}

function TeleCell({ label, value }) {
  return (
    <div className="rounded-lg bg-white/[0.03] border border-white/[0.05] px-3 py-2.5">
      <div className="text-[8.5px] uppercase tracking-[0.18em] text-slate-500 mb-1">{label}</div>
      <div className="font-mono text-[12px] text-slate-200">{value}</div>
    </div>
  );
}

function BottomPanel({ open, onToggle, flight, dataAge, onAirport, trafficOn, trafficList }) {
  const live = flight && flight.live;
  // no tracked flight but the radar is on → show a live sky snapshot instead
  // of a dead-end empty state
  const sky = React.useMemo(() => {
    if (flight || !trafficOn || !trafficList || !trafficList.length) return null;
    const highest = trafficList.reduce((m, t) => (t.alt > m.alt ? t : m), trafficList[0]);
    const fastest = trafficList.reduce((m, t) => (t.gs > m.gs ? t : m), trafficList[0]);
    const byAirline = {};
    for (const t of trafficList) { const n = airlineName(t.callsign); if (n) byAirline[n] = (byAirline[n] || 0) + 1; }
    const top = Object.entries(byAirline).sort((a, b) => b[1] - a[1])[0] || null;
    return { highest, fastest, top };
  }, [flight, trafficOn, trafficList]);
  return (
    <div className="fixed inset-x-0 bottom-0 z-40"
      style={{ transform: open ? 'translateY(0)' : 'translateY(100%)', transition: 'transform .55s cubic-bezier(.32,.72,0,1)' }}>

      <button onClick={onToggle}
        className="absolute -top-11 left-1/2 -translate-x-1/2 glass-strong rounded-full pl-3.5 pr-3 py-[7px] flex items-center gap-2

        <span className="w-1.5 h-1.5 rounded-full bg-cyanx pulse-dot"></span>
        Flight Details
        <span className="transition-transform duration-500" style={{ transform: open ? 'rotate(180deg)' : 'rotate(0deg)' }}>
          <Icon d="chevUp" size={13} stroke={2.2} />

        <div className="flex items-center justify-between px-7 pt-5 pb-1">
          <div className="flex items-center gap-3">
            <h3 className="font-display text-[15px] font-medium text-slate-100">Flight Details</h3>
            {flight
              ? <span className="text-[9px] uppercase tracking-[0.18em] text-emerald-300 bg-emerald-400/10 border border-emerald-400/20 rounded-full px-2 py-0.5">{flight.airline ? flight.airline + ' · ' : ''}{flight.code} · Live</span>
              : <span className="text-[9px] uppercase tracking-[0.18em] text-slate-400 bg-white/[0.05] border border-white/10 rounded-full px-2 py-0.5">No flight tracked</span>}
          </div>
          <button onClick={onToggle} className="w-8 h-8 rounded-full glass flex items-center justify-center text-slate-400 btn-glass" title="Collapse">
            <span style={{ transform: 'rotate(180deg)' }}><Icon d="chevUp" size={13} stroke={2.2} /></span>

        </div>

        {flight ? (
          <div className="grid grid-cols-1 lg:grid-cols-[1.75fr_1fr] gap-6 px-7 pb-7 pt-3 max-h-[42vh] overflow-y-auto">
            <div>
              <div className="flex gap-3 mb-4">
                <AirportBlock tag="Departure" tone="text-emerald-300" ap={flight.route && flight.route.dep} onClick={onAirport} />
                <div className="self-center text-amber-300/70 shrink-0"><Icon d="plane" size={16} stroke={0} className="fill-current rotate-45" /></div>
                <AirportBlock tag="Arrival" tone="text-amber-300" ap={flight.route && flight.route.arr} onClick={onAirport} />
              </div>
              <div className="grid grid-cols-4 gap-2">
                <TeleCell label="Registration" value={live?.reg || '—'} />
                <TeleCell label="Aircraft" value={live?.type || '—'} />
                <TeleCell label="ICAO24" value={live?.hex || '—'} />
                <TeleCell label="Squawk" value={live?.squawk || '—'} />
                <TeleCell label="V / Rate" value={live ? `${live.baroRate > 0 ? '+' : ''}${live.baroRate} fpm` : '—'} />
                <TeleCell label="Track" value={live ? `${Math.round(live.track)}°` : '—'} />
                <TeleCell label="Position age" value={dataAge} />
                <TeleCell label="Source" value="airplanes.live" />
              </div>
            </div>

            <div className="rounded-2xl border border-white/[0.07] bg-white/[0.03] p-5">
              <div className="flex items-center justify-between mb-4">
                <h4 className="font-display text-[13.5px] font-medium text-slate-100">Journey Progress</h4>
                <span className="text-[9.5px] font-bold uppercase tracking-[0.18em] text-amber-300 bg-amber-400/10 border border-amber-400/25 rounded-full px-2.5 py-1">{phaseOf(live)}</span>
              </div>
              <div className="flex items-center gap-5">
                <ProgressGauge pct={flight.progressPct} />

          <div className="px-7 pb-7 pt-3">

              <TeleCell label="Fastest" value={`${sky.fastest.callsign} · ${Math.round(sky.fastest.gs)} kt`} />

              Live sky around your view — no flight tracked yet.

            <div className="text-center text-slate-600 text-[11px] mt-1">
              Click any aircraft on the globe to see where it's going, then Track it for full details here.
            </div>
          </div>
        ) : (
          <div className="px-7 pb-9 pt-4 text-center">
            <div className="text-slate-400 text-[13px]">Search a flight code above to see live details</div>
            <div className="text-slate-600 text-[11px] mt-1.5 font-mono">AirAsia AK · Qatar QR · Emirates EK · JAL JL · ANA NH</div>
          </div>
        )}
      </div>
    </div>
  );
}

function LoadingOverlay({ progress, label, done }) {
  const [hidden, setHidden] = useState(false);
  useEffect(() => {
    if (done) { const t = setTimeout(() => setHidden(true), 800); return () => clearTimeout(t); }
  }, [done]);
  if (hidden) return null;
  return (
    <div className={`fixed inset-0 z-[100] flex flex-col items-center justify-center transition-opacity duration-700 ${done ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}
      style={{ background: 'radial-gradient(900px 600px at 50% 40%, #0B1526, #060B16)' }}>
      <div className="relative w-14 h-14 mb-7">
        <div className="absolute inset-0 rounded-full border border-sky-400/20"></div>
        <div className="absolute inset-0 rounded-full border-t-2 border-sky-400/80" style={{ animation: 'spin-slow 1.2s linear infinite' }}></div>
        <div className="absolute inset-0 flex items-center justify-center text-sky-300"><Icon d="globe" size={22} stroke={1.4} /></div>
      </div>
      <div className="font-display font-light text-[15px] tracking-[0.5em] uppercase text-slate-300 mb-6 ml-[0.5em]">Global View</div>
      <div className="w-[220px] h-[3px] rounded-full bg-white/[0.07] overflow-hidden mb-3">

/* ---------- command palette (⌘K) ---------- */

function CommandPalette({ open, onClose, run, recents, flightActive, settings, matchCountry }) {
  const [q, setQ] = useState('');
  const [sel, setSel] = useState(0);
  const inputRef = useRef(null);
  useEffect(() => {
    if (open) { setQ(''); setSel(0); setTimeout(() => inputRef.current && inputRef.current.focus(), 30); }
  }, [open]);
  if (!open) return null;

  const norm = q.trim().toLowerCase();
  const codeLike = /^[a-z0-9]{3,8}$/i.test(q.trim()) && /\d/.test(q.trim());

  const cmds = [];
  if (codeLike) cmds.push({ id: 'track-q', icon: 'search', label: `Track flight "${q.trim().toUpperCase()}"`, hint: 'live search', act: () => run('track', q.trim()), pin: true });
  const country = (!codeLike && matchCountry && q.trim().length >= 2) ? matchCountry(q.trim()) : null;
  if (country) cmds.push({ id: 'country-q', icon: 'globe', label: `Live flights over ${country.name}`, hint: 'transit · departing · standby', act: () => run('country', country), pin: true });
  cmds.push(
    { id: 'traffic',   icon: 'radar',     label: 'Toggle traffic layer',            hint: 'T', act: () => run('traffic') },
    { id: 'radar',     icon: 'radar',     label: 'Open live radar',                 hint: 'R', act: () => run('drawer', 'radar') },
    { id: 'incidents', icon: 'warn',      label: 'Live incidents — emergency squawks', act: () => run('drawer', 'incidents') },
    { id: 'famous',    icon: 'plane',     label: 'Famous flights',                  act: () => run('drawer', 'flights') },
    { id: 'details',   icon: 'chart',     label: 'Flight details',                  hint: 'D', act: () => run('drawer', 'details') },
    { id: 'history',   icon: 'clock',     label: 'History & replay',                act: () => run('drawer', 'history') },
    { id: 'settings',  icon: 'gear',      label: 'Settings',                        act: () => run('drawer', 'settings') },
    { id: 'about',     icon: 'info',      label: 'About, data sources & shortcuts', act: () => run('drawer', 'about') },
    { id: 'night',     icon: 'moon',      label: 'Toggle day / night',              act: () => run('night') },
    { id: 'mode',      icon: 'grid2d',    label: 'Toggle 3D / 2D view',             act: () => run('mode') },
    { id: 'weather',   icon: 'globe',     label: `${settings.weather ? 'Hide' : 'Show'} live weather radar`, act: () => run('setting', 'weather') },
    { id: 'clouds',    icon: 'globe',     label: `${settings.clouds ? 'Hide' : 'Show'} cloud layer`,         act: () => run('setting', 'clouds') },
    { id: 'labels',    icon: 'globe',     label: `${settings.labels ? 'Hide' : 'Show'} country labels`,      act: () => run('setting', 'labels') },
    { id: 'reset',     icon: 'target',    label: 'Reset view',                      act: () => run('reset') },
  );
  if (flightActive) cmds.push(
    { id: 'follow', icon: 'crosshair', label: 'Follow / unfollow tracked flight', hint: 'F', act: () => run('follow') },
    { id: 'share',  icon: 'link',      label: 'Copy shareable flight link',       act: () => run('share') },
    { id: 'stop',   icon: 'x',         label: 'Stop tracking',                    act: () => run('stop') },
  );
  recents.forEach(r => cmds.push({ id: 'rec-' + r, icon: 'clock', label: `Track ${r} again`, hint: 'recent', act: () => run('track', r) }));
  FAMOUS_FLIGHTS.forEach(f => cmds.push({ id: 'ff-' + f.code, icon: 'plane', label: `Track ${f.code} — ${f.route}`, hint: 'famous', act: () => run('track', f.code) }));

  const score = (c) => {
    if (c.pin) return 3;
    if (!norm) return 1;
    const l = c.label.toLowerCase();
    if (l.includes(norm)) return 2;
    let i = 0;
    for (const ch of l) if (ch === norm[i]) i++;
    return i === norm.length ? 1 : 0;
  };
  const list = cmds.map(c => [score(c), c]).filter(([s]) => s > 0)
    .sort((a, b) => b[0] - a[0]).map(([, c]) => c).slice(0, 12);
  const selIdx = Math.min(sel, Math.max(0, list.length - 1));

  const onKey = (e) => {
    // ⌘K toggles closed even while the input is focused (and never leaks
    // to the browser's own Ctrl/⌘K address-bar shortcut)
    if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) { e.preventDefault(); onClose(); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); setSel(s => Math.min(s + 1, list.length - 1)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setSel(s => Math.max(s - 1, 0)); }
    else if (e.key === 'Enter') { e.preventDefault(); if (list[selIdx]) { onClose(); list[selIdx].act(); } }
    else if (e.key === 'Escape') onClose();
    e.stopPropagation();
  };

  return (
    <div className="fixed inset-0 z-[80] flex items-start justify-center pt-[15vh]"
      onPointerDown={(e) => { if (e.target === e.currentTarget) onClose(); }}
      style={{ background: 'rgba(3,6,14,0.55)', backdropFilter: 'blur(4px)' }}>
      <div className="w-[540px] max-w-[92vw] glass-strong rounded-2xl shadow-2xl shadow-black/70 overflow-hidden" style={{ animation: 'drawerIn .18s ease' }}>
        <div className="flex items-center gap-2.5 px-4 py-3 border-b border-white/[0.07]">
          <Icon d="cmd" size={14} className="text-slate-500" />
          <input ref={inputRef} value={q} onChange={e => { setQ(e.target.value); setSel(0); }} onKeyDown={onKey}
            placeholder="Type a command or flight code…"
            className="bg-transparent outline-none text-[13px] text-slate-100 placeholder-slate-500 w-full" />
          <span className="text-[9px] text-slate-600 font-mono border border-white/10 rounded px-1.5 py-0.5 shrink-0">ESC</span>
        </div>
        <div className="max-h-[46vh] overflow-y-auto py-1.5">
          {list.length === 0 && <div className="px-4 py-3 text-[11.5px] text-slate-500">Nothing matches — try a flight code like MH370 or AK6045.</div>}
          {list.map((c, i) => (
            <button key={c.id} onClick={() => { onClose(); c.act(); }} onMouseEnter={() => setSel(i)}
              className={`w-full text-left px-4 py-2.5 flex items-center gap-3 transition-colors ${i === selIdx ? 'bg-white/[0.07]' : ''}`}>
              <span className={i === selIdx ? 'text-amber-300' : 'text-slate-500'}><Icon d={c.icon} size={14} /></span>
              <span className="flex-1 text-[12px] text-slate-200 truncate">{c.label}</span>
              {c.hint && <span className="text-[8.5px] text-slate-600 uppercase tracking-[0.15em] shrink-0">{c.hint}</span>}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ---------- multi-flight watch chips ---------- */

function WatchChips({ watched, onPromote, onRemove }) {
  if (!watched.length) return null;
  return (
    <div className="absolute left-[88px] bottom-[108px] z-10 flex flex-col gap-2">
      {watched.map(w => {
        const lv = w.live;
        return (
          <div key={w.callsign} className="glass-strong rounded-full pl-3 pr-1.5 py-1.5 flex items-center gap-2.5 shadow-xl shadow-black/50"
            style={{ animation: 'drawerIn .25s ease' }}>
            <span className="w-1.5 h-1.5 rounded-full bg-cyan-300 shrink-0"></span>
            <button onClick={() => onPromote(w)} title="Switch full tracking to this flight" className="text-left">
              <span className="font-mono font-bold text-[11px] text-slate-100">{w.code}</span>
              <span className="ml-2 text-[9px] font-mono text-slate-400">
                {lv
                  ? `${lv.alt === 'ground' ? 'GND' : (typeof lv.alt === 'number' ? Math.round(lv.alt / 100) * 100 + ' ft' : '—')} · ${Math.round(lv.gs || 0)} kt`
                  : (w.misses >= 2 ? 'signal lost' : 'acquiring…')}
              </span>
            </button>
            <button onClick={() => onRemove(w)} title="Stop watching"
              className="w-5 h-5 rounded-full glass flex items-center justify-center text-slate-500 hover:text-rose-300 btn-glass shrink-0">
              <Icon d="x" size={8} stroke={2.6} />
            </button>
          </div>
        );
      })}
    </div>
  );
}

/* ---------- session replay scrubber ---------- */

function ReplayBar({ rp, onChange, onExit }) {
  const pts = rp.info.points;
  const dur = Math.max(1, (pts[pts.length - 1].t - pts[0].t) / 1000);
  const fmt = (s) => `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`;
  return (
    <div className="fixed bottom-16 left-1/2 -translate-x-1/2 z-[46] w-[460px] max-w-[92vw] glass-strong rounded-2xl px-4 py-3 shadow-2xl shadow-black/70"
      style={{ animation: 'drawerIn .25s ease' }}>
      <div className="flex items-center justify-between mb-2">
        <div className="flex items-center gap-2 text-[9.5px] uppercase tracking-[0.18em] text-amber-300 font-bold">
          <Icon d="rewind" size={12} stroke={2} /> Replay
          <span className="font-mono text-slate-100 normal-case">{rp.info.code}</span>
          {rp.info.dep && rp.info.arr && (
            <span className="text-slate-400 tracking-normal">{rp.info.dep.iata} → {rp.info.arr.iata}</span>
          )}
        </div>
        <button onClick={onExit} title="Exit replay"
          className="w-6 h-6 rounded-full glass flex items-center justify-center text-slate-400 btn-glass">
          <Icon d="x" size={10} stroke={2.4} />

/* ---------- data-source health (passive, from real request timings) ---------- */

const DATA_SOURCES = [
  ['airplanes.live', 'Live ADS-B positions'],
  ['adsbdb.com', 'Routes · airlines · registry'],
  ['hexdb.io', 'Route & airport fallback'],
  ['planespotters.net', 'Airframe photos'],
  ['rainviewer.com', 'Weather radar'],
];

function SourceHealth() {
  const [open, setOpen] = useState(false);
  const [, setTick] = useState(0);
  useEffect(() => {
    const iv = setInterval(() => setTick(n => n + 1), open ? 1500 : 5000);
    return () => clearInterval(iv);
  }, [open]);

  const stat = (h) => {
    const s = SOURCE_HEALTH[h];
    if (!s || Date.now() - s.ts > 10 * 60 * 1000) return { code: 'idle', dot: 'bg-slate-600', label: 'idle', cls: 'text-slate-500' };
    if (!s.ok) return { code: 'down', dot: 'bg-rose-400', label: 'unreachable', cls: 'text-rose-300' };
    if (s.ms > 2500) return { code: 'slow', dot: 'bg-amber-400', label: `slow · ${(s.ms / 1000).toFixed(1)} s`, cls: 'text-amber-300' };
    return { code: 'ok', dot: 'bg-emerald-400', label: `${Math.round(s.ms)} ms`, cls: 'text-emerald-300' };
  };
  const codes = DATA_SOURCES.map(([h]) => stat(h).code);
  const overall = codes.includes('down') ? 'bg-rose-400' : codes.includes('slow') ? 'bg-amber-400' : codes.includes('ok') ? 'bg-emerald-400' : 'bg-slate-600';

  return (
    <div className="absolute right-7 bottom-[112px] z-10 select-none">
      {open && (
        <div className="absolute bottom-10 right-0 w-[248px] glass-strong rounded-2xl p-2 shadow-2xl shadow-black/60">
          <div className="text-[9px] uppercase tracking-[0.2em] text-slate-500 px-2.5 pt-1.5 pb-1.5">Data source health</div>
          {DATA_SOURCES.map(([h, what]) => {
            const st = stat(h);
            return (
              <div key={h} className="px-2.5 py-1.5 flex items-center justify-between gap-2">
                <div className="min-w-0">
                  <div className="text-[10.5px] text-slate-200 font-mono truncate">{h}</div>
                  <div className="text-[8.5px] text-slate-600 truncate">{what}</div>
                </div>
                <div className={`flex items-center gap-1.5 shrink-0 text-[9px] font-mono ${st.cls}`}>
                  <span className={`w-1.5 h-1.5 rounded-full ${st.dot}`}></span>{st.label}
                </div>
              </div>
            );
          })}
          <div className="text-[8.5px] text-slate-600 leading-relaxed px-2.5 pt-1.5 pb-1 border-t border-white/[0.06] mt-1">
            Measured passively from live requests. Idle = not queried in the last 10 minutes.
          </div>
        </div>
      )}
      <button onClick={() => setOpen(o => !o)} title="Data source health"
        className="glass rounded-full h-8 px-3 flex items-center gap-2 btn-glass">
        <span className={`w-1.5 h-1.5 rounded-full ${overall}`}></span>
        <span className="text-[9px] uppercase tracking-[0.18em] text-slate-400">Data</span>
      </button>
    </div>
  );
}

  useEffect(() => {
    const home = tzGuess();

      onReady: () => {
        setReady(true);
        if (home) eng.setUserLocation(home.lat, home.lng, home.name, false);
        // shareable deep link: ?flight=MH370 starts tracking immediately
        try {
          const dl = (new URLSearchParams(window.location.search).get('flight') || '').trim();
          if (dl) setTimeout(() => startTrackingRef.current && startTrackingRef.current(dl), 900);
        } catch (e) {}
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              const { latitude, longitude } = pos.coords;
              if (flightRef.current) return;   // don't yank the camera off a tracked flight
              const country = eng.countryAt(latitude, longitude) || eng.nearestCountry(latitude, longitude);
              eng.setUserLocation(latitude, longitude, country || (home && home.name) || 'You', true);
            },
            () => {},
            { timeout: 6000, maximumAge: 600000 }
          );
        }
      },
      onError: (msg) => { setError(msg); setReady(true); },
    });
    engineRef.current = eng;
    window.__gv = eng;   // debug handle
    eng.init();
    return () => { eng.dispose(); if (pollRef.current) clearInterval(pollRef.current); };
  }, []);

  // global incidents watch — every emergency squawk in the world (7500/7600/7700)
  const [incidents, setIncidents] = useState([]);
  const [tickerHidden, setTickerHidden] = useState(false);
  const incidentsRef = useRef([]);
  useEffect(() => {
    let stop = false;
    const sweep = async () => {
      const found = [];
      for (const sq of ['7700', '7600', '7500']) {
        try {
          const j = await fetchJson('https://api.airplanes.live/v2/squawk/' + sq, undefined, 8000);
          for (const a of (j.ac || [])) {
            if (a.lat == null || a.lon == null || a.alt_baro === 'ground') continue;
            found.push({
              hex: a.hex, callsign: (a.flight || '').trim() || (a.r || '').trim() || (a.hex || '').toUpperCase(),
              squawk: sq, lat: a.lat, lng: a.lon,
              alt: typeof a.alt_baro === 'number' ? a.alt_baro : 0,
              gs: typeof a.gs === 'number' ? a.gs : 0,
              track: typeof a.track === 'number' ? a.track : 0,
              type: (a.t || '').trim(), category: a.category || '',
              rx: Date.now() - (a.seen_pos || 0) * 1000,
            });
          }
        } catch (e) { /* endpoint hiccup — keep the previous list */ }
        if (stop) return;
        await new Promise(r => setTimeout(r, 400));   // gentle on the API
      }
      if (stop) return;
      const prevKeys = new Set(incidentsRef.current.map(i => i.hex + i.squawk));
      if (found.some(i => !prevKeys.has(i.hex + i.squawk))) setTickerHidden(false);
      incidentsRef.current = found;
      setIncidents(found);
      for (const i of found) {
        if (!alertedRef.current.has('inc-' + i.hex)) {
          alertedRef.current.add('inc-' + i.hex);
          notify(`⚠ ${i.callsign} squawking ${i.squawk} — ${SQUAWK_ALERTS[i.squawk]}`, 'warn');
        }
      }
    };
    sweep();
    const iv = setInterval(sweep, 75000);
    return () => { stop = true; clearInterval(iv); };
  }, []);

  // airport mode — live traffic around a clicked airport
  const [airport, setAirport] = useState(null);   // {ap, list, at, loading}
  const openAirport = useCallback((ap) => {
    if (!ap || ap.lat == null) return;
    // re-clicking the same airport keeps the existing list (the running
    // 15s interval would otherwise leave "scanning…" over nothing)
    setAirport(prev => (prev && prev.ap === ap) ? prev : { ap, list: [], at: null, loading: true });
    setDrawer('airport');
    engineRef.current?.flyTo(ap.lat, ap.lng, 1.75);
  }, []);
  useEffect(() => {
    if (drawer !== 'airport' || !airport || !airport.ap) return;
    let stop = false;
    const ap = airport.ap;
    const tick = async () => {
      try {
        const list = await fetchTraffic(ap.lat, ap.lng, 60);
        if (stop) return;
        for (const t of list) {
          t.dist = gcKm({ lat: ap.lat, lng: ap.lng }, t);
          // heading within 55° of the bearing to the airport → inbound; within 55° of the reciprocal → outbound
          const brg = initialBearing({ lat: t.lat, lng: t.lng }, { lat: ap.lat, lng: ap.lng });
          const diff = Math.abs(((t.track - brg) % 360 + 540) % 360 - 180);
          t.dir = diff <= 55 ? 'in' : diff >= 125 ? 'out' : 'over';
        }
        list.sort((a, b) => a.dist - b.dist);
        setAirport(prev => (prev && prev.ap === ap) ? { ...prev, list, at: Date.now(), loading: false } : prev);
      } catch (e) {
        if (!stop) setAirport(prev => (prev && prev.ap === ap) ? { ...prev, loading: false } : prev);
      }
    };
    tick();
    const iv = setInterval(tick, 15000);
    return () => { stop = true; clearInterval(iv); };
  }, [drawer, airport && airport.ap]);

  // command palette · multi-flight watch · session replay · tour
  const [paletteOpen, setPaletteOpen] = useState(false);
  const [watched, setWatched] = useState([]);          // up to 2 secondary flights
  const [lastReplay, setLastReplay] = useState(null);  // recorded track from this session
  const [replayUI, setReplayUI] = useState(null);      // {info, t, playing, speed}
  const [tourStep, setTourStep] = useState(-1);
  const watchedRef = useRef([]);
  watchedRef.current = watched;
  const replayBufRef = useRef([]);
  const replayCtl = useRef({ t: 0, playing: true, speed: 120 });

  // poll watched flights on a relaxed 15s cadence
  useEffect(() => {
    const eng = engineRef.current;
    if (!watched.length) { eng && eng.setWatched([]); return; }
    let stop = false;
    const tick = async () => {
      const cur = watchedRef.current;
      const next = [];
      for (const w of cur) {
        try {
          const j = await fetchJson('https://api.airplanes.live/v2/callsign/' + encodeURIComponent(w.callsign));
          const ac = (j.ac || []).filter(a => a.lat != null);
          next.push(ac.length ? { ...w, live: normalizeLive(ac[0]), misses: 0 } : { ...w, misses: (w.misses || 0) + 1 });
        } catch (e) { next.push(w); }
        if (stop) return;
      }
      setWatched(next);
      engineRef.current && engineRef.current.setWatched(
        next.filter(w => w.live).map(w => ({ ...w.live, label: w.code }))
      );
    };
    tick();
    const iv = setInterval(tick, 15000);
    return () => { stop = true; clearInterval(iv); };
  }, [watched.map(w => w.callsign).join(',')]);

  const watchFlight = useCallback((t, force) => {
    const callsign = (t.callsign || '').trim().toUpperCase();
    if (!callsign) return;
    const primary = flightRef.current;
    if (!force && primary && primary.callsign === callsign) { notify('Already tracking that flight', 'info'); return; }
    setWatched(w => {
      if (w.some(x => x.callsign === callsign)) return w;
      const live = t.lat != null
        ? { lat: t.lat, lng: t.lng, gs: t.gs || 0, track: t.track || 0, alt: t.alt, rx: t.rx || Date.now() }
        : null;
      return [...w, { code: callsign, callsign, live, misses: 0 }].slice(-2);
    });
    notify(`Watching ${callsign} alongside — click its chip to switch`, 'info');
  }, [notify]);

  // country mode — sweep a whole country's sky, grouped by flight phase
  const [countryView, setCountryView] = useState(null);   // {info, list, samples, at, loading}
  const openCountry = useCallback((c) => {
    setCountryView(prev => (prev && prev.info && prev.info.name === c.name)
      ? prev
      : { info: c, list: [], samples: 1, at: null, loading: true });
    setDrawer('country');
    engineRef.current?.flyTo(c.centroid.lat, c.centroid.lng, 2.3);
  }, []);
  useEffect(() => {
    if (drawer !== 'country' || !countryView || !countryView.info) return;
    let stop = false;
    const info = countryView.info;
    const tick = async () => {
      const eng = engineRef.current;
      if (!eng) return;
      const r = await fetchCountryFlights(eng, info);
      if (stop) return;
      setCountryView(prev => (prev && prev.info === info)
        ? { ...prev, list: r.list, samples: r.samples, at: Date.now(), loading: false }
        : prev);
    };
    tick();
    const iv = setInterval(tick, 25000);
    return () => { stop = true; clearInterval(iv); };
  }, [drawer, countryView && countryView.info]);

  // the search box takes flight codes AND country names — no digits + a
  // border-dataset match means the user wants a country sweep
  const handleSearch = useCallback((input) => {
    const q = (input || '').trim();
    const eng = engineRef.current;
    if (!/\d/.test(q) && eng && eng.countryInfo) {
      const c = eng.countryInfo(q);
      if (c) { openCountry(c); return; }
    }
    startTrackingRef.current && startTrackingRef.current(q);
  }, [openCountry]);

  // area traffic polling — refreshes around the current view centre
  useEffect(() => {
    const eng = engineRef.current;
    if (!eng) return;
    eng.setTrafficEnabled(trafficOn);
    if (!trafficOn) { setTrafficCount(0); return; }
    let stop = false;
    const tick = async () => {
      try {
        setTrafficLoading(true);
        const c = eng._frontLatLng();
        const list = await fetchTraffic(c.lat, c.lng, 250);
        if (stop) return;
        const tracked = flightRef.current && flightRef.current.callsign;
        const filtered = list.filter(t => t.callsign !== tracked);
        filtered.forEach(t => { t.dist = gcKm(c, t); });
        // nearest first so the 400-instance cap keeps the closest aircraft
        filtered.sort((a, b) => a.dist - b.dist);
        eng.setTraffic(filtered);
        setTrafficCount(filtered.length);
        setTrafficList(filtered);
        setTrafficAt(Date.now());
        // emergency squawk watch (7500 / 7600 / 7700) — notify once per aircraft
        for (const t of filtered) {
          if (SQUAWK_ALERTS[t.squawk] && !alertedRef.current.has(t.callsign)) {
            alertedRef.current.add(t.callsign);
            notify(`⚠ ${t.callsign} squawking ${t.squawk} — ${SQUAWK_ALERTS[t.squawk]}`, 'warn');
          }
        }
      } catch (e) { /* transient — keep the previous frame of traffic */ }
      finally { if (!stop) setTrafficLoading(false); }
    };
    tick();
    const iv = setInterval(tick, 12000);
    return () => { stop = true; clearInterval(iv); };
  }, [trafficOn]);

  // 1s ticker while tracking (data age display)
  useEffect(() => {
    if (!flight) return;
    const t = setInterval(() => setNowTick(n => n + 1), 1000);
    return () => clearInterval(t);
  }, [!!flight]);

  // apply user settings to the engine (also once it becomes ready)
  useEffect(() => {
    const eng = engineRef.current;
    if (!eng || !ready) return;
    eng.setClouds(settings.clouds);
    eng.setLabels(settings.labels);
    eng.setWeather(!!settings.weather);
    eng.setQuality({ balanced: 1.5, high: 2.5, ultra: 3.5 }[settings.quality] || 2.5);
    if (settings.quality !== 'balanced') eng.upgradeTextures();   // idempotent
    try { localStorage.setItem('gv-settings', JSON.stringify(settings)); } catch (e) {}
  }, [settings, ready]);

  // notify on phase changes and signal loss
  const prevPhaseRef = useRef(null);
  useEffect(() => {
    if (!flight || !flight.live) { prevPhaseRef.current = null; return; }
    const ph = phaseOf(flight.live);
    if (prevPhaseRef.current && ph !== prevPhaseRef.current) {
      notify(`${flight.callsign} is now ${ph.toLowerCase()}`, ph === 'Descending' ? 'warn' : 'info');
    }
    prevPhaseRef.current = ph;
  }, [flight && flight.live && phaseOf(flight.live)]);
  const prevMissRef = useRef(0);
  useEffect(() => {
    const m = flight ? (flight.misses || 0) : 0;
    if (m === 3 && prevMissRef.current < 3) notify(`${flight.callsign} — signal lost, extrapolating`, 'warn');
    prevMissRef.current = m;
  }, [flight && flight.misses]);

  // keyboard shortcuts — ⌘K palette, Esc closes, / focuses search, t/r/d/f power tools
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) {
        e.preventDefault();
        setPaletteOpen(o => !o);
        return;
      }
      if (e.key === 'Escape') { setPaletteOpen(false); setDrawer(null); setBellOpen(false); setAvatarOpen(false); setQuickLook(null); return; }
      const tag = (e.target && e.target.tagName) || '';
      if (tag === 'INPUT' || tag === 'TEXTAREA' || e.metaKey || e.ctrlKey || e.altKey) return;
      if (e.key === '/') { e.preventDefault(); document.querySelector('form input')?.focus(); }
      else if (e.key === 't') setTrafficOn(v => !v);
      else if (e.key === 'r') setDrawer(d => d === 'radar' ? null : 'radar');
      else if (e.key === 'd') setDrawer(d => d === 'details' ? null : 'details');
      else if (e.key === 'f') { if (flightRef.current) { setFollowState(v => { engineRef.current?.setFollow(!v); return !v; }); } }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const applyLive = useCallback((prev, live, code, callsign, route) => {
    const cur = { lat: live.lat, lng: live.lng };
    let progressPct = null, remainKm = null, totalKm = null;
    if (route) {
      totalKm = gcKm(route.dep, route.arr);
      const done = gcKm(route.dep, cur);
      remainKm = gcKm(cur, route.arr);
      if (totalKm > 50) progressPct = Math.max(0, Math.min(100, done / (done + remainKm) * 100));
    }
    const histAlt = [...(prev ? prev.histAlt : []), typeof live.alt === 'number' ? live.alt : 0].slice(-20);
    const histSpd = [...(prev ? prev.histSpd : []), live.gs || 0].slice(-20);
    return {
      ...(prev || {}),   // keep aircraft registry info / photo across polls
      code, callsign,
      airline: (route && route.airline && route.airline.name) || airlineName(callsign),
      live, route, progressPct, remainKm, totalKm, histAlt, histSpd, misses: 0,
    };
  }, []);

  // stash the recorded positions of the flight we're about to drop, for replay
  const stashReplay = useCallback(() => {
    const buf = replayBufRef.current;
    const f = flightRef.current;
    if (f && buf.length >= 5) {
      setLastReplay({
        code: f.code, callsign: f.callsign, points: buf.slice(), ts: Date.now(),
        dep: f.route ? f.route.dep : null, arr: f.route ? f.route.arr : null,
      });
      notify(`Replay of ${f.callsign} saved — find it under History`, 'info');
    }
    replayBufRef.current = [];
  }, [notify]);

  const clearGrounded = useCallback(() => {
    setGrounded(null);
    engineRef.current && engineRef.current.clearFlight();
  }, []);

  const stopTracking = useCallback(() => {
    if (pollRef.current) { clearInterval(pollRef.current); pollRef.current = null; }
    stashReplay();
    if (flightRef.current) notify(`Stopped tracking ${flightRef.current.callsign}`, 'info');
    engineRef.current && engineRef.current.clearFlight();
    setFlight(null);
    setGrounded(null);
    setFollowState(false);
    setSearchError(null);
    try {
      const u = new URL(window.location.href);
      u.searchParams.delete('flight');
      window.history.replaceState(null, '', u);
    } catch (e) {}
  }, [notify, stashReplay]);

  // `seed` (optional) is the aircraft object the user clicked (traffic dart /
  // radar row / incident) — we already know its hex and position, so tracking
  // must not fail just because the callsign lookup comes back empty
  const startTracking = useCallback(async (input, seed) => {
    const eng = engineRef.current;
    if (!eng) return;
    setSearching(true);
    setSearchError(null);
    setGrounded(null);
    try {
      let found = await findAircraft(input);
      if (!found && seed && seed.hex) {
        // callsign search missed — look the exact airframe up by hex instead
        try {
          const j = await fetchJson('https://api.airplanes.live/v2/hex/' + encodeURIComponent(seed.hex));
          const hit = (j.ac || []).filter(a => a.lat != null)[0];
          if (hit) found = { ac: hit, callsign: (hit.flight || '').trim() || seed.callsign };
        } catch (e) { /* fall through to the clicked position */ }
      }
      if (!found && seed && seed.lat != null && Date.now() - (seed.rx || 0) < 5 * 60 * 1000) {
        // the dart the user clicked IS a recent position — start from it and
        // let the poll refresh the rest
        found = {
          ac: {
            hex: seed.hex, flight: seed.callsign, lat: seed.lat, lon: seed.lng,
            gs: seed.gs, track: seed.track, alt_baro: seed.alt,
            squawk: seed.squawk || '', t: seed.type || '', category: seed.category || '',
            seen_pos: Math.max(0, (Date.now() - (seed.rx || Date.now())) / 1000),
          },
          callsign: seed.callsign,
        };
      }
      if (!found && !seed) {
        // typed search that missed — the callsign index lags or rate-limits
        // for a beat, so one retry recovers most "live flight not found" cases
        await new Promise(r => setTimeout(r, 800));
        found = await findAircraft(input);
      }
      if (!found) {
        // genuinely not broadcasting a live position (parked, between flights,
        // or not yet departed). Don't dead-end — surface the route/airline we
        // can still resolve from adsbdb/hexdb so the search stays useful.
        const code = input.toUpperCase().replace(/[^A-Z0-9]/g, '');
        let route = null, usedCs = null;
        for (const c of searchCandidates(input)) {
          try { route = await cachedRoute(c); } catch (e) { route = null; }
          if (route) { usedCs = c; break; }
        }
        if (pollRef.current) { clearInterval(pollRef.current); pollRef.current = null; }
        setReplayUI(null);
        eng.clearFlight();
        setFlight(null);
        setFollowState(false);
        if (route) {
          eng.setFlightRoute(route.dep, route.arr);        // draw the corridor
          eng.flyTo(route.dep.lat, route.dep.lng, 2.5);    // fly to where it operates
          setGrounded({
            code, callsign: usedCs || code,
            airline: (route.airline && route.airline.name) || airlineName(usedCs) || airlineName(code),
            route,
          });
          setSearchError(null);
          notify(`${code} isn't airborne now — showing its route ${route.dep.iata} → ${route.arr.iata}`, 'info');
        } else {
          setGrounded(null);
          setSearchError(`${code} isn't broadcasting live right now — it may be parked, between flights, or not yet departed.`);
        }
        setSearching(false);
        return;
      }
      setGrounded(null);
      // replace any previous flight (stashing its recording for replay);
      // an active replay must die here too, or its 30 Hz driver keeps
      // overriding the new flight and its exit-cleanup wipes the route
      setReplayUI(null);
      if (pollRef.current) { clearInterval(pollRef.current); pollRef.current = null; }
      stashReplay();
      eng.clearFlight();

      const code = input.toUpperCase().replace(/[^A-Z0-9]/g, '');
      const callsign = ((found.ac.flight || '').trim()) || found.callsign;
      const live = normalizeLive(found.ac);
      // if it was on the watch list, promote it out of there
      setWatched(w => w.filter(x => x.callsign !== callsign));
      replayBufRef.current = [{
        t: live.rx, lat: live.lat, lng: live.lng,
        alt: typeof live.alt === 'number' ? live.alt : 0, gs: live.gs || 0, track: live.track || 0,
      }];
      const route = await findRoute(callsign);

      eng.setFlightState(live, callsign);
      if (route) eng.setFlightRoute(route.dep, route.arr);
      eng.flyTo(live.lat, live.lng, 2.0);
      eng.setFollow(true);
      setFollowState(true);

      setFlight(prev => applyLive(null, live, code, callsign, route));
      setRecents(r => {
        const next = [code, ...r.filter(x => x !== code)].slice(0, 3);
        try { localStorage.setItem('gv-recent-flights', JSON.stringify(next)); } catch (e) {}
        return next;
      });
      pushHistory({ code, callsign, ts: Date.now(),
        dep: route && route.dep ? route.dep.iata : null, arr: route && route.arr ? route.arr.iata : null });
      try {
        const u = new URL(window.location.href);
        u.searchParams.set('flight', code);
        window.history.replaceState(null, '', u);   // shareable deep link
      } catch (e) {}
      notify(`Tracking ${callsign}${route && route.airline ? ' · ' + route.airline.name : ''}`, 'ok');
      if (route) notify(`Route ${route.dep.iata} → ${route.arr.iata} resolved`, 'info');

      // enrich asynchronously: aircraft registry details + a photo of this airframe
      fetchAircraftInfo(live.hex).then(info => {
        if (info) setFlight(f => (f && f.callsign === callsign) ? { ...f, aircraft: info } : f);
      });
      fetchPhoto(live.hex).then(photo => {
        if (photo) setFlight(f => (f && f.callsign === callsign) ? { ...f, photo } : f);
      });

      // poll live position — by hex when we have it (survives callsign
      // changes and empty callsign-index results), by callsign otherwise
      const pollUrl = (live.hex && live.hex !== '—')
        ? 'https://api.airplanes.live/v2/hex/' + encodeURIComponent(live.hex)
        : 'https://api.airplanes.live/v2/callsign/' + encodeURIComponent(callsign);
      pollRef.current = setInterval(async () => {
        try {
          const j = await fetchJson(pollUrl);
          const ac = (j.ac || []).filter(a => a.lat != null);
          if (ac.length) {
            const lv = normalizeLive(ac[0]);
            engineRef.current && engineRef.current.setFlightState(lv, callsign);
            setFlight(prev => prev ? applyLive(prev, lv, prev.code, callsign, prev.route) : prev);
            // record for session replay (skip if the position hasn't moved)
            const buf = replayBufRef.current, lastP = buf[buf.length - 1];
            if ((!lastP || lastP.lat !== lv.lat || lastP.lng !== lv.lng) && buf.length < 4500) {
              buf.push({ t: lv.rx, lat: lv.lat, lng: lv.lng,
                alt: typeof lv.alt === 'number' ? lv.alt : 0, gs: lv.gs || 0, track: lv.track || 0 });
            }
          } else {
            setFlight(prev => prev ? { ...prev, misses: (prev.misses || 0) + 1 } : prev);
          }
        } catch (e) { /* transient network error — keep extrapolating */ }
      }, POLL_MS);
    } catch (e) {
      setSearchError('Search failed — check your connection and try again.');
    }
    setSearching(false);
  }, [applyLive, stashReplay]);
  startTrackingRef.current = startTracking;

  // ---- session replay driver ----
  const startReplay = useCallback((info) => {
    if (!info || !info.points || info.points.length < 2) return;
    if (pollRef.current) { clearInterval(pollRef.current); pollRef.current = null; }
    stashReplay();
    engineRef.current && engineRef.current.clearFlight();
    setFlight(null);
    setFollowState(false);
    setDrawer(null);
    replayCtl.current = { t: 0, playing: true, speed: 120 };
    // fresh info reference every start — restarting the same recording must
    // re-run the driver effect (route + flyTo), not just reset the clock
    setReplayUI({ info: { ...info }, t: 0, playing: true, speed: 120 });
  }, [stashReplay]);

  useEffect(() => {
    if (!replayUI) return;
    const eng = engineRef.current;
    if (!eng) return;
    const info = replayUI.info;
    const pts = info.points;
    const t0 = pts[0].t;
    const dur = Math.max(1, (pts[pts.length - 1].t - t0) / 1000);
    if (info.dep && info.arr) eng.setFlightRoute(info.dep, info.arr);
    eng.flyTo(pts[0].lat, pts[0].lng, 2.0);
    eng.setFollow(true);
    // interval-driven, NOT requestAnimationFrame — hidden/backgrounded tabs
    // never fire rAF (same reason the engine has its own fallback ticker)
    let last = performance.now(), uiLast = 0;
    const step = () => {
      const now = performance.now();
      const ctl = replayCtl.current;
      const dt = Math.min((now - last) / 1000, 0.25);
      last = now;
      if (ctl.playing) {
        ctl.t += dt * ctl.speed;
        if (ctl.t >= dur) { ctl.t = dur; ctl.playing = false; }
      }
      const target = t0 + ctl.t * 1000;
      let i = 0;
      while (i < pts.length - 2 && pts[i + 1].t < target) i++;
      const a = pts[i], b = pts[Math.min(i + 1, pts.length - 1)];
      const f = b.t > a.t ? Math.min(1, Math.max(0, (target - a.t) / (b.t - a.t))) : 0;
      let dl = b.lng - a.lng;
      if (dl > 180) dl -= 360; else if (dl < -180) dl += 360;
      eng.setFlightState({
        lat: a.lat + (b.lat - a.lat) * f,
        lng: ((a.lng + dl * f + 540) % 360) - 180,
        gs: 0, track: a.track || 0,
        alt: a.alt + ((b.alt || 0) - (a.alt || 0)) * f,
        baroRate: 0, rx: Date.now(), squawk: '—', hex: '—', reg: '—', type: '—', raw: {},
      }, `${info.code} · replay`);
      if (now - uiLast > 250) {
        uiLast = now;
        setReplayUI(r => r ? { ...r, t: ctl.t, playing: ctl.playing, speed: ctl.speed } : r);
      }
    };
    const iv = setInterval(step, 33);
    return () => { clearInterval(iv); eng.clearFlight(); eng.setFollow(false); };
  }, [replayUI && replayUI.info]);

  const changeReplay = (patch) => {
    Object.assign(replayCtl.current, patch);
    setReplayUI(r => r ? { ...r, ...patch } : r);
  };

  // ---- first-visit tour ----
  useEffect(() => {
    if (!ready) return;
    try {
      if (localStorage.getItem('gv-tour-done')) return;
      if (new URLSearchParams(window.location.search).get('flight')) return;
    } catch (e) { return; }
    const t = setTimeout(() => setTourStep(0), 1600);
    return () => clearTimeout(t);
  }, [ready]);
  const endTour = () => {
    setTourStep(-1);
    try { localStorage.setItem('gv-tour-done', '1'); } catch (e) {}
  };

  const toggleNight = () => setNight(n => { engineRef.current?.setNight(!n); return !n; });
  const changeMode = (m) => { setMode(m); engineRef.current?.setMode(m); };
  const toggleFollow = () => {
    const next = !follow;
    setFollowState(next);
    engineRef.current?.setFollow(next);
  };
  const centerOnPlane = () => {
    const eng = engineRef.current;
    if (eng && eng.flightState) {
      const p = vec3ToLatLng(eng.planeVec);
      eng.flyTo(p.lat, p.lng, 2.0);
    }
  };
  const shareFlight = () => {
    const done = () => notify('Link copied — anyone opening it tracks this flight', 'ok');
    const fail = () => notify('Copy blocked — grab the link from the URL bar', 'warn');
    try { navigator.clipboard.writeText(window.location.href).then(done, fail); }
    catch (e) { fail(); }
  };

  // single dispatcher for command-palette actions
  const runCommand = (cmd, arg) => {
    const eng = engineRef.current;
    if (cmd === 'track') startTrackingRef.current && startTrackingRef.current(arg);
    else if (cmd === 'traffic') setTrafficOn(v => !v);
    else if (cmd === 'drawer') setDrawer(d => d === arg ? null : arg);
    else if (cmd === 'night') toggleNight();
    else if (cmd === 'mode') changeMode(mode === '3d' ? '2d' : '3d');
    else if (cmd === 'setting') setSettings(s => ({ ...s, [arg]: !s[arg] }));
    else if (cmd === 'reset') eng && eng.resetView();
    else if (cmd === 'follow') toggleFollow();
    else if (cmd === 'stop') stopTracking();
    else if (cmd === 'share') shareFlight();
    else if (cmd === 'country') openCountry(arg);
  };

  const promoteWatched = (w) => {
    setWatched(ws => ws.filter(x => x.callsign !== w.callsign));
    const prev = flightRef.current;
    // demote the old primary only after the swap actually completes —
    // a fixed timeout races the search and silently drops the flight
    startTracking(w.code, w.live ? { ...w.live, callsign: w.callsign } : undefined).then(() => {
      if (prev && prev.live) {
        const pl = prev.live;
        watchFlight({ callsign: prev.callsign, lat: pl.lat, lng: pl.lng, gs: pl.gs, track: pl.track, alt: pl.alt, rx: pl.rx }, true);
      }
    });
  };

  const ageSec = flight && flight.live ? Math.max(0, Math.round((Date.now() - flight.live.rx) / 1000)) : null;
  const statusText = flight
    ? (flight.misses >= 3 ? 'SIGNAL LOST' : `UPDATED ${ageSec}s AGO`)
    : (trafficOn ? `${trafficCount} AIRCRAFT NEARBY` : 'ADS-B NETWORK');
  const dataAge = ageSec != null ? `${ageSec}s ago` : '—';

  return (
    <div className="fixed inset-0 backdrop overflow-hidden font-body text-slate-200">
      <div className="absolute inset-0 grid-overlay pointer-events-none"></div>
      <div className="absolute inset-0 vignette pointer-events-none z-[8]"></div>
      <div className="absolute inset-2 rounded-[26px] border border-white/[0.05] pointer-events-none z-[9]"></div>

      <div id="globe-canvas-host" className="absolute inset-0 z-0"></div>
      <MarkerLayer onAirport={(which) => {
        const f = flightRef.current;
        if (f && f.route) openAirport(which === 'dep' ? f.route.dep : f.route.arr);
      }} />

      {error && (
        <div className="absolute inset-0 z-10 flex items-center justify-center">
          <div className="glass-strong rounded-2xl px-8 py-6 text-center max-w-sm">
            <div className="text-slate-100 font-medium mb-1">3D view unavailable</div>
            <div className="text-slate-400 text-sm">{error}</div>
          </div>
        </div>
      )}

      <Sidebar drawer={drawer} incidentCount={incidents.length}
        onNav={(key) => { setDrawer(d => d === key ? null : key); setBellOpen(false); setAvatarOpen(false); }}
        onHome={() => { setDrawer(null); engineRef.current?.resetView(); }} />
      <Header night={night} onToggleNight={toggleNight} statusText={statusText}
        notifs={notifs} unread={unread} bellOpen={bellOpen}
        onBell={() => { setBellOpen(o => { if (!o) setUnread(0); return !o; }); setAvatarOpen(false); }}
        avatarOpen={avatarOpen} onAvatar={() => { setAvatarOpen(o => !o); setBellOpen(false); }}
        home={homeRef.current} />
      <TrafficToggle on={trafficOn} count={trafficCount} loading={trafficLoading} onToggle={() => setTrafficOn(v => !v)} />
      <SearchPanel
        flight={flight} grounded={grounded} searching={searching} error={searchError}
        onSearch={handleSearch} onStop={stopTracking}
        follow={follow} onFollow={toggleFollow} onCenter={centerOnPlane} onShare={shareFlight}
        onRetry={handleSearch} onClearGrounded={clearGrounded} />
      <Telemetry flight={flight} units={settings.units} />
      <QuickChips recents={recents} onPick={startTracking} activeCode={flight && flight.code} />
      <Coordinates />
      <ViewToggle mode={mode} onChange={changeMode} />
      <ZoomControls
        onIn={() => engineRef.current?.zoomBy(0.82)}
        onOut={() => engineRef.current?.zoomBy(1.22)}
        onReset={() => engineRef.current?.resetView()} />
      <SourceHealth />

      <BottomPanel open={panelOpen} onToggle={() => setPanelOpen(o => !o)} flight={flight} dataAge={dataAge} onAirport={openAirport}
        trafficOn={trafficOn} trafficList={trafficList} />

      {!tickerHidden && <IncidentTicker incidents={incidents}
        onPick={(i) => { engineRef.current?.flyTo(i.lat, i.lng, 1.9); openQuickLook(i, { x: window.innerWidth / 2, y: window.innerHeight * 0.42 }); }}
        onHide={() => setTickerHidden(true)} />}

      {drawer === 'radar' && <RadarDrawer on={trafficOn} list={trafficList} updatedAt={trafficAt}
        onEnable={() => setTrafficOn(true)}
        onRow={(t) => { engineRef.current?.flyTo(t.lat, t.lng, 1.9); openQuickLook(t, { x: window.innerWidth / 2, y: window.innerHeight * 0.42 }); }}
        onClose={() => setDrawer(null)} />}
      {drawer === 'flights' && <FamousDrawer onPick={(code) => { setDrawer(null); startTracking(code); }} onClose={() => setDrawer(null)} />}
      {drawer === 'details' && <DetailsDrawer flight={flight} dataAge={dataAge} onClose={() => setDrawer(null)} />}
      {drawer === 'history' && <HistoryDrawer history={history} lastReplay={lastReplay} onReplay={startReplay}
        onPick={(code) => { setDrawer(null); startTracking(code); }}
        onClear={() => { setHistory([]); try { localStorage.removeItem('gv-history'); } catch (e) {} }} onClose={() => setDrawer(null)} />}
      {drawer === 'settings' && <SettingsDrawer settings={settings} onChange={setSettings} onClose={() => setDrawer(null)} />}
      {drawer === 'about' && <AboutDrawer onClose={() => setDrawer(null)} />}
      {drawer === 'incidents' && <IncidentsDrawer incidents={incidents}
        onPick={(i) => { engineRef.current?.flyTo(i.lat, i.lng, 1.9); openQuickLook(i, { x: window.innerWidth / 2, y: window.innerHeight * 0.42 }); }}
        onClose={() => setDrawer(null)} />}
      {drawer === 'airport' && <AirportDrawer info={airport}
        onRow={(t) => { engineRef.current?.flyTo(t.lat, t.lng, 1.8); openQuickLook(t, { x: window.innerWidth / 2, y: window.innerHeight * 0.42 }); }}
        onClose={() => setDrawer(null)} />}
      {drawer === 'country' && <CountryDrawer view={countryView}
        onRow={(t) => { engineRef.current?.flyTo(t.lat, t.lng, 1.8); openQuickLook(t, { x: window.innerWidth / 2, y: window.innerHeight * 0.42 }); }}
        onClose={() => setDrawer(null)} />}

      {quickLook && <QuickLook q={quickLook}
        onTrack={(cs, t) => { setQuickLook(null); startTracking(cs, t); }}
        onWatch={flight && quickLook.t.callsign !== flight.callsign && !watched.some(w => w.callsign === (quickLook.t.callsign || '').trim().toUpperCase())
          ? (t) => { setQuickLook(null); watchFlight(t); } : null}
        onClose={() => setQuickLook(null)} />}

      <WatchChips watched={watched} onPromote={promoteWatched}
        onRemove={(w) => setWatched(ws => ws.filter(x => x.callsign !== w.callsign))} />

      {replayUI && <ReplayBar rp={replayUI} onChange={changeReplay} onExit={() => setReplayUI(null)} />}

      <CommandPalette open={paletteOpen} onClose={() => setPaletteOpen(false)} run={runCommand}
        recents={recents} flightActive={!!flight} settings={settings}
        matchCountry={(q) => { const eng = engineRef.current; return (!/\d/.test(q) && eng && eng.countryInfo) ? eng.countryInfo(q) : null; }} />

      {tourStep >= 0 && <Tour step={tourStep}
        onNext={() => (tourStep >= TOUR_STEPS.length - 1 ? endTour() : setTourStep(s => s + 1))}
        onSkip={endTour} />}

      <LoadingOverlay progress={progress} label={progLabel} done={ready} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
